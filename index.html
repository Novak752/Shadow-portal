  async get(k){try{const v=localStorage.getItem('sp:'+k);return v?JSON.parse(v):null}catch{return null}},
  async set(k,v){try{localStorage.setItem('sp:'+k,JSON.stringify(v))}catch(e){console.warn('storage set',e)}},
  async getShared(k){try{const v=localStorage.getItem('sp_sh:'+k);return v?JSON.parse(v):null}catch{return null}},

  async listShared(prefix){try{return Object.keys(localStorage).filter(k=>k.startsWith('sp_sh:'+prefix)).map(k=>k.replace('sp_sh:',''))}catch{return[]}},
};

/* ── SHA256 HELPER ── */
async function sha256(message){
  const msgBuffer=new TextEncoder().encode(message);
  const hashBuffer=await crypto.subtle.digest('SHA-256',msgBuffer);
  const hashArray=Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ── TOAST SYSTEM ── */
let _setToasts=null;
function toast(msg,type='p'){if(_setToasts)_setToasts(p=>[...p,{id:Date.now(),msg,type}]);}

function ToastWrap(){
  const[toasts,setToasts]=useState([]);
  useEffect(()=>{_setToasts=setToasts},[]);
  useEffect(()=>{
    if(toasts.length){const t=setTimeout(()=>setToasts(p=>p.slice(1)),1500);return()=>clearTimeout(t);}
  },[toasts]);
  return<div className="toast-wrap">{toasts.map(t=><div key={t.id} className={`toast toast-${t.type}`}>{t.msg}</div>)}</div>;
}

/* ── MODAL ── */
function Modal({open,onClose,title,children,footer}){
  if(!open)return null;
  return<div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal">
      <div className="modal-header">
        <h3>{title}</h3>
        <div className="modal-close" onClick={onClose}>✕</div>
      </div>
      <div className="modal-body">{children}</div>
      {footer&&<div className="modal-footer">{footer}</div>}
    </div>
  </div>;
}

          <div style={{position:'relative'}}>
            <input type={showPass?'text':'password'} placeholder="Your password" value={form.pass} onChange={e=>set('pass',e.target.value)} onKeyDown={e=>e.key==='Enter'&&doLogin()} style={{paddingRight:40}} autoComplete="current-password"/>
            <button onClick={()=>setShowPass(p=>!p)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--text3)',fontSize:14}}>{showPass?'🙈':'👁'}</button>
          </div>
        </div>
        <div style={{textAlign:'right',marginBottom:16}}><span style={{fontSize:12,color:'var(--p2)',cursor:'pointer'}} onClick={()=>toast('Password reset requires email backend — coming soon','p')}>Forgot password?</span></div>
        <button className="btn btn-p btn-full" style={{fontSize:14,padding:13}} onClick={doLogin} disabled={busy}>{busy?'Signing in…':'Sign In →'}</button>

        <button className="btn btn-ghost btn-full" style={{gap:10,fontSize:13,marginBottom:14}} onClick={()=>toast('Google login coming soon — needs backend setup','p')}>
          <span style={{fontSize:16,fontWeight:700,fontFamily:'serif',color:'#4285F4'}}>G</span>Continue with Google
        </button>
        <p style={{textAlign:'center',fontSize:12,color:'var(--text3)'}}>No account yet? <span style={{color:'var(--p2)',cursor:'pointer',fontWeight:600}} onClick={()=>setTab('register')}>Sign up free →</span></p>
      </>}

      {tab==='client'&&<>
        <div style={{background:'var(--p3)',border:'1px solid rgba(108,92,231,.2)',borderRadius:10,padding:14,marginBottom:16,fontSize:13,color:'var(--p2)',lineHeight:1.7}}>
          <strong>🔗 Client Portal Access</strong><br/>Your freelancer will send you a magic link. Enter your email to request a new one.
        </div>
        <div className="field mb16"><label>Your Email</label><input type="email" placeholder="you@company.com" value={form.email} onChange={e=>set('email',e.target.value)} onKeyDown={e=>e.key==='Enter'&&form.email&&toast('Magic link sent to '+form.email,'g')}/></div>
        <button className="btn btn-p btn-full" style={{fontSize:14,padding:13}} onClick={()=>{if(!form.email){setErr('Please enter your email');return;}toast('Magic link sent to '+form.email+'! Check your inbox.','g');}}>Send Magic Link</button>
        <p style={{textAlign:'center',fontSize:12,color:'var(--text3)',marginTop:14}}>Are you a freelancer? <span style={{color:'var(--p2)',cursor:'pointer',fontWeight:600}} onClick={()=>setTab('register')}>Sign up here →</span></p>
      </>}
    </div>
  </div>;
}

function AdminApp({session,setSession,onLogout}){

  const[branding,setBranding]=useState({logo:null,name:'',primary:'#6c5ce7',accent:'#a29bfe',removePowered:true,domain:''});
  const isSA=session.user.isSuperAdmin;
  const canBrand=session.user.plan==='agency'||isSA;

  // Load branding on mount and whenever tab changes to branding
  const loadBranding=React.useCallback(async()=>{
    const b=await DB.get('branding');
    if(b){
      setBranding(b);
      if(b.primary)document.documentElement.style.setProperty('--p',b.primary);
      if(b.accent)document.documentElement.style.setProperty('--p2',b.accent);
    }
  },[]);

  useEffect(()=>{loadBranding();},[]);
  useEffect(()=>{if(tab==='branding')loadBranding();},[tab]);

  const loadUsers=useCallback(async()=>{
    const u=await DB.getShared('users')||{};
    setUsers(u);
    // Check online (active within last 2 min)
    const now=Date.now();
    const online=[];
    for(const key of Object.keys(u)){
      const o=await DB.getShared(`online:${key}`);
      if(o&&o.ts&&(now-o.ts)<120000)online.push(key);
    }
    setOnlineUsers(online);
  },[]);

  useEffect(()=>{loadUsers();const i=setInterval(loadUsers,30000);return()=>clearInterval(i);},[loadUsers]);

  const refreshUser=useCallback(async()=>{
    const u=await DB.getShared('users')||{};
    const me=u[session.user.email];
    if(me)setSession(p=>({...p,user:{...me,email:session.user.email}}));
    setUsers(u);

    {id:'overview',icon:'📊',label:'Overview'},

      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <button className="hamburger" onClick={()=>setDrawerOpen(p=>!p)} aria-label="Menu">
          <span/><span/><span/>
        </button>
        <div style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}} onClick={()=>setTab('overview')}>
          <div style={{width:30,height:30,borderRadius:8,background:`linear-gradient(135deg,${branding.primary||'#6c5ce7'},${branding.accent||'#a29bfe'})`,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:13,color:'#fff',overflow:'hidden',flexShrink:0}}>
            {canBrand&&branding.logo?<img src={branding.logo} alt="logo" style={{width:'100%',height:'100%',objectFit:'contain'}}/>:<span>{canBrand&&branding.name?branding.name.charAt(0).toUpperCase():'S'}</span>}
          </div>
          <span style={{fontWeight:800,fontSize:15}} className="nav-logo-text">
            {canBrand&&branding.name
              ?<>{branding.name}<span style={{color:branding.accent||'var(--p2)'}}>.</span></>
              :canBrand&&branding.logo
              ?<>{session.user.studio||'My Studio'}<span style={{color:'var(--p2)'}}>.</span></>
              :<>shadow<span style={{color:'var(--p2)'}}>.</span></>}
          </span>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>

        {/* Clickable avatar with dropdown */}

                </div>
                <div style={{background:'var(--bg3)',borderRadius:8,padding:'8px 10px',textAlign:'center'}}>

              </div>
              {/* Menu items */}

    {/* Mobile Drawer Overlay */}

          <div style={{display:'flex',alignItems:'center',gap:8}}>

              {canBrand&&branding.logo?<img src={branding.logo} alt="" style={{width:'100%',height:'100%',objectFit:'contain'}}/>:<span>{canBrand&&branding.name?branding.name.charAt(0).toUpperCase():'S'}</span>}

  const onlineCount=onlineUsers.length;

  const projects=u.projects||[];

  return<div>
    <div className="mb24">

    {isSA&&<div className="grid3 mb24">

        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div className="stat-val" style={{color:'var(--g)'}}>{onlineCount}</div>
          <div className="online-dot"/>
        </div>
        <div style={{fontSize:12,color:'var(--g)',marginTop:6}}>Active in last 2 minutes →</div>

      <div className="card" style={{cursor:'pointer',transition:'border-color .15s'}} onClick={()=>setTab('leaderboard')} onMouseOver={e=>e.currentTarget.style.borderColor='var(--y)'} onMouseOut={e=>e.currentTarget.style.borderColor='var(--border)'}>

];

function ProjectDetail({proj,idx,onSave}){
  const milestones=proj.milestones||DEFAULT_MILESTONES.map((label,i)=>({id:`m${i}`,label,done:false}));
  const[localMilestones,setLocalMilestones]=useState(milestones);
  const[manualProgress,setManualProgress]=useState(proj.progress||0);
  const[mode,setMode]=useState(proj.milestones?'auto':'manual'); // auto=milestone-driven, manual=slider
  const[newMilestone,setNewMilestone]=useState('');

  const autoProgress=Math.round((localMilestones.filter(m=>m.done).length/localMilestones.length)*100);
  const displayProgress=mode==='auto'?autoProgress:manualProgress;

  const toggleMilestone=async(i)=>{
    const nm=[...localMilestones];nm[i]={...nm[i],done:!nm[i].done};
    setLocalMilestones(nm);
    const newProg=Math.round((nm.filter(m=>m.done).length/nm.length)*100);
    const newStatus=newProg===100?'done':newProg>0?'active':'active';
    await onSave({milestones:nm,progress:mode==='auto'?newProg:manualProgress,status:newStatus});
    toast(`Milestone ${nm[i].done?'completed ✓':'unchecked'}`,nm[i].done?'g':'p');
  };

  const addMilestone=async()=>{
    if(!newMilestone.trim())return;
    const nm=[...localMilestones,{id:`m${Date.now()}`,label:newMilestone.trim(),done:false}];
    setLocalMilestones(nm);setNewMilestone('');
    await onSave({milestones:nm,progress:mode==='auto'?Math.round((nm.filter(m=>m.done).length/nm.length)*100):manualProgress});
    toast('Milestone added','g');
  };

  const deleteMilestone=async(i)=>{
    const nm=localMilestones.filter((_,j)=>j!==i);
    setLocalMilestones(nm);
    await onSave({milestones:nm,progress:mode==='auto'?Math.round((nm.filter(m=>m.done).length/nm.length)*100):manualProgress});
  };

  const saveManualProgress=async()=>{
    await onSave({progress:manualProgress});
    toast('Progress saved ✓','g');
  };

  // Auto-save manual progress on slider release
  const onSliderRelease=async(val)=>{
    setManualProgress(val);
    await onSave({progress:val});
    toast('Progress saved ✓','g');
  };

  const progColor=displayProgress===100?'var(--g)':displayProgress>=60?'var(--p2)':displayProgress>=30?'var(--y)':'var(--r)';

  return<div>
    {/* Info row */}
    <div style={{background:'var(--bg3)',borderRadius:10,padding:14,marginBottom:16,display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,fontSize:13}}>
      <div><span style={{color:'var(--text3)'}}>Client</span><div style={{fontWeight:700,marginTop:2}}>{proj.client||'—'}</div></div>
      <div><span style={{color:'var(--text3)'}}>Due</span><div style={{fontWeight:700,marginTop:2}}>{fmtDate(proj.due)}</div></div>
      <div><span style={{color:'var(--text3)'}}>Created</span><div style={{fontWeight:600,marginTop:2,fontSize:12}}>{fmtDate(proj.createdAt)}</div></div>
      <div><span style={{color:'var(--text3)'}}>Status</span>
        <select value={proj.status} onChange={async e=>await onSave({status:e.target.value})}
          style={{display:'block',marginTop:2,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:7,padding:'4px 8px',color:'var(--text)',fontSize:12,cursor:'pointer',fontFamily:'var(--font)',width:'100%'}}>
          <option value="active">Active</option><option value="review">In Review</option><option value="done">Done</option><option value="paused">Paused</option>
        </select>
      </div>
    </div>

    {/* Progress bar */}
    <div style={{marginBottom:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <span style={{fontWeight:700,fontSize:13}}>Progress</span>
        <span style={{color:progColor,fontWeight:900,fontSize:20}}>{displayProgress}%</span>
      </div>
      <div style={{background:'var(--bg3)',borderRadius:99,overflow:'hidden',height:12,marginBottom:10}}>
        <div style={{height:'100%',borderRadius:99,background:`linear-gradient(90deg,${progColor},${progColor}aa)`,width:`${displayProgress}%`,transition:'width .5s cubic-bezier(.4,0,.2,1)'}}/>
      </div>
      {/* Mode toggle */}
      <div style={{display:'flex',background:'var(--bg3)',borderRadius:8,padding:3,gap:3,marginBottom:12}}>
        <button onClick={()=>setMode('auto')} style={{flex:1,padding:'7px 8px',border:'none',borderRadius:6,cursor:'pointer',fontFamily:'var(--font)',fontSize:12,fontWeight:600,background:mode==='auto'?'linear-gradient(135deg,var(--p),var(--p2))':'transparent',color:mode==='auto'?'#fff':'var(--text2)',transition:'all .15s'}}>
          ⚡ Auto (Milestones)
        </button>
        <button onClick={()=>setMode('manual')} style={{flex:1,padding:'7px 8px',border:'none',borderRadius:6,cursor:'pointer',fontFamily:'var(--font)',fontSize:12,fontWeight:600,background:mode==='manual'?'var(--bg4)':'transparent',color:mode==='manual'?'var(--text)':'var(--text2)',transition:'all .15s'}}>
          ✏️ Manual Slider
        </button>
      </div>
      {mode==='manual'&&<div style={{display:'flex',gap:8,alignItems:'center'}}>
        <input type="range" min={0} max={100} step={1} value={manualProgress}
          onChange={e=>setManualProgress(+e.target.value)}
          onMouseUp={e=>onSliderRelease(+e.target.value)}
          onTouchEnd={()=>onSliderRelease(manualProgress)}
          style={{flex:1,accentColor:'var(--p)',cursor:'pointer'}}/>
        <span style={{fontSize:13,fontWeight:700,color:'var(--p2)',minWidth:36}}>{manualProgress}%</span>
        <button className="btn btn-p btn-sm" onClick={saveManualProgress}>Save</button>
      </div>}
      {mode==='auto'&&<div style={{fontSize:12,color:'var(--text3)',textAlign:'center',padding:'4px 0'}}>
        {localMilestones.filter(m=>m.done).length} of {localMilestones.length} milestones complete — progress updates automatically
      </div>}
    </div>

    {/* Milestones */}
    <div style={{fontWeight:700,fontSize:13,marginBottom:10,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <span>📋 Milestones</span>
      <span style={{fontSize:11,color:'var(--text3)',fontWeight:400}}>{mode==='auto'?'Checking milestones updates progress automatically':'Milestones tracked but progress is manual'}</span>
    </div>
    <div style={{marginBottom:12}}>
      {localMilestones.map((m,i)=><div key={m.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:9,border:`1px solid ${m.done?'rgba(0,184,148,.3)':'var(--border)'}`,background:m.done?'rgba(0,184,148,.06)':'transparent',marginBottom:6,cursor:'pointer',transition:'all .15s'}}
        onClick={()=>toggleMilestone(i)}
        onMouseOver={e=>e.currentTarget.style.borderColor=m.done?'var(--g)':'var(--p)'}
        onMouseOut={e=>e.currentTarget.style.borderColor=m.done?'rgba(0,184,148,.3)':'var(--border)'}>
        <div style={{width:22,height:22,borderRadius:'50%',border:`2px solid ${m.done?'var(--g)':'var(--border2)'}`,background:m.done?'var(--g)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .2s'}}>
          {m.done&&<span style={{color:'#fff',fontSize:12,fontWeight:800}}>✓</span>}
        </div>
        <span style={{flex:1,fontSize:13,fontWeight:m.done?600:400,color:m.done?'var(--g)':'var(--text)',textDecoration:m.done?'none':'none'}}>{m.label}</span>
        <button onClick={e=>{e.stopPropagation();deleteMilestone(i);}} style={{background:'transparent',border:'none',cursor:'pointer',color:'var(--text3)',fontSize:14,padding:'0 4px',opacity:.5}}
          onMouseOver={e=>{e.currentTarget.style.color='var(--r)';e.currentTarget.style.opacity=1}}
          onMouseOut={e=>{e.currentTarget.style.color='var(--text3)';e.currentTarget.style.opacity=.5}}>✕</button>
      </div>)}
    </div>

    {/* Add milestone */}
    <div style={{display:'flex',gap:8}}>
      <input placeholder="Add a milestone… e.g. Final Client Review"
        value={newMilestone} onChange={e=>setNewMilestone(e.target.value)}
        onKeyDown={e=>e.key==='Enter'&&addMilestone()}
        style={{flex:1,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:9,padding:'9px 14px',color:'var(--text)',fontSize:13,outline:'none',fontFamily:'var(--font)'}}/>
      <button className="btn btn-p btn-sm" onClick={addMilestone}>+ Add</button>
    </div>
  </div>;
}

/* ══════════════════════════════════════
   PROJECTS TAB
══════════════════════════════════════ */
function ProjectsTab({session,refreshUser}){
  const[modal,setModal]=useState(false);
  const[projects,setProjects]=useState([]);
  const[form,setForm]=useState({name:'',client:'',due:'',status:'active'});
  const[editProg,setEditProg]=useState(null);
  const[selectedProj,setSelectedProj]=useState(null);
  useEffect(()=>{
    (async()=>{
      const users=await DB.getShared('users')||{};
      const u=users[session.user.email];
      setProjects(u?.projects||session.user.projects||[]);
    })();
  },[session.user.email]);

  const save=async(newProjects)=>{
    setProjects(newProjects); // update UI immediately
    const users=await DB.getShared('users')||{};
    if(users[session.user.email]){
      users[session.user.email].projects=newProjects;
      await DB.setShared('users',users);
    }
  };

  const addProject=async()=>{
    if(!form.name){toast('Enter a project name','r');return;}
    const p={id:`p_${Date.now()}`,name:form.name,client:form.client,due:form.due,status:form.status,progress:0,createdAt:new Date().toISOString()};
    await save([...projects,p]);
    setModal(false);setForm({name:'',client:'',due:'',status:'active'});
    toast('Project created ✓','g');
  };

  const updateProgress=async(idx,val)=>{
    const np=[...projects];np[idx].progress=parseInt(val);
    await save(np);
    setEditProg(null);
    toast('Progress saved ✓','g');
  };

  const deleteProject=async(idx)=>{
    if(!confirm('Delete this project?'))return;
    const np=projects.filter((_,i)=>i!==idx);await save(np);toast('Project deleted','p');
  };

  const canAdd=session.user.plan!=='free'||(projects.length<2);

  return<div>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}}>
      <div><div style={{fontSize:20,fontWeight:800}}>Projects</div><div style={{color:'var(--text2)',fontSize:13}}>Manage all client projects</div></div>
      <button className="btn btn-p" onClick={()=>{if(!canAdd){toast('Free plan: 2 project limit. Upgrade to Pro.','r');return;}setModal(true);}}>+ New Project</button>
    </div>

    {!canAdd&&<div className="alert alert-y">⚠️ Free plan is limited to 2 projects. <span style={{fontWeight:700,cursor:'pointer',textDecoration:'underline'}}>Upgrade to Pro</span> for unlimited.</div>}

    {projects.length===0?<div className="card" style={{textAlign:'center',padding:'50px 20px'}}>
      <div style={{fontSize:40,marginBottom:12}}>📁</div>
      <div style={{fontWeight:700,marginBottom:6}}>No projects yet</div>
      <button className="btn btn-p" style={{marginTop:8}} onClick={()=>setModal(true)}>+ Create first project</button>
    </div>:
    <div className="card"><div style={{overflowX:'auto'}}><table className="tbl">
      <thead><tr><th>Project</th><th>Client</th><th>Progress</th><th>Due</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>{projects.map((p,i)=><tr key={p.id} style={{cursor:'pointer'}} onClick={()=>setSelectedProj({p,i})} onMouseOver={e=>{[...e.currentTarget.cells].forEach(c=>c.style.background='rgba(108,92,231,.06)')}} onMouseOut={e=>{[...e.currentTarget.cells].forEach(c=>c.style.background='')}}>
        <td><div style={{fontWeight:600}}>{p.name}</div><div style={{fontSize:11,color:'var(--text3)'}}>Click to view details</div></td>
        <td style={{color:'var(--text2)'}}>{p.client||'—'}</td>
        <td onClick={e=>{e.stopPropagation();editProg?.idx===i?null:setEditProg({idx:i,val:p.progress||0})}}>
          {editProg?.idx===i
            ?<div style={{display:'flex',alignItems:'center',gap:6}} onClick={e=>e.stopPropagation()}>
               <input type="range" min={0} max={100} step={1} value={editProg.val}
                 onChange={e=>setEditProg({idx:i,val:+e.target.value})}
                 onMouseUp={e=>updateProgress(i,+e.target.value)}
                 onTouchEnd={e=>updateProgress(i,editProg.val)}
                 style={{width:80,accentColor:'var(--p)',cursor:'pointer'}}/>
               <span style={{fontSize:12,minWidth:28,color:'var(--p2)',fontWeight:700}}>{editProg.val}%</span>
               <button className="btn btn-g btn-sm" onClick={e=>{e.stopPropagation();updateProgress(i,editProg.val)}}>✓</button>
               <button className="btn btn-ghost btn-sm" onClick={e=>{e.stopPropagation();setEditProg(null)}}>✕</button>
             </div>
            :<div style={{display:'flex',alignItems:'center',gap:8}}>
               <div className="prog-track" style={{height:6,width:70}}><div className="prog-fill" style={{width:`${p.progress||0}%`,height:'100%'}}/></div>
               <span style={{fontSize:12,color:'var(--text2)'}}>{p.progress||0}%</span>
               <span style={{fontSize:10,color:'var(--p2)'}}>✏️</span>
             </div>
          }
        </td>
        <td style={{color:'var(--text2)',fontSize:12}}>{fmtDate(p.due)}</td>
        <td><span className={`badge ${p.status==='active'?'badge-g':p.status==='done'?'badge-p':'badge-y'}`}>{p.status}</span></td>
        <td onClick={e=>e.stopPropagation()}><button className="btn btn-ghost btn-sm" style={{color:'var(--r)'}} onClick={()=>deleteProject(i)}>✕</button></td>
      </tr>)}</tbody>
    </table></div></div>}

    <Modal open={!!selectedProj} onClose={()=>setSelectedProj(null)} title={`📁 ${selectedProj?.p?.name||''}`}
      footer={<><button className="btn btn-r btn-sm" onClick={()=>{deleteProject(selectedProj.i);setSelectedProj(null);}}>🗑 Delete</button><button className="btn btn-ghost" style={{flex:1}} onClick={()=>setSelectedProj(null)}>Close</button></>}>
      {selectedProj&&<ProjectDetail
        proj={selectedProj.p} idx={selectedProj.i}
        onSave={async(updated)=>{
          const np=[...projects];np[selectedProj.i]={...np[selectedProj.i],...updated};
          await save(np);
          setSelectedProj(p=>({...p,p:{...p.p,...updated}}));
        }}
      />}
    </Modal>

    <Modal open={modal} onClose={()=>setModal(false)} title="📁 New Project"
      footer={<><button className="btn btn-p" style={{flex:1}} onClick={addProject}>Create Project</button><button className="btn btn-ghost" onClick={()=>setModal(false)}>Cancel</button></>}>
      <div className="field mb12"><label>Project Name</label><input placeholder="Brand Identity v2" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/></div>
      <div className="field mb12"><label>Client Name</label><input placeholder="TechCorp Inc." value={form.client} onChange={e=>setForm(p=>({...p,client:e.target.value}))}/></div>
      <div className="field mb12"><label>Due Date</label><input type="date" value={form.due} onChange={e=>setForm(p=>({...p,due:e.target.value}))}/></div>
      <div className="field mb0"><label>Status</label>
        <select value={form.status} onChange={e=>setForm(p=>({...p,status:e.target.value}))}>
          <option value="active">Active</option><option value="review">In Review</option><option value="done">Done</option><option value="paused">Paused</option>
        </select>
      </div>
    </Modal>
  </div>;
}

          <button className="btn btn-ghost" style={{flex:1}} onClick={()=>{const link=`${window.location.origin}${window.location.pathname}?invite=${btoa(selectedClient.c.email)}&portal=client`;navigator.clipboard.writeText(link).then(()=>toast('🔗 Invite link copied! Share on WhatsApp, Telegram, email…','g')).catch(()=>toast(link,'p'));}} title="Copy link to share anywhere">🔗 Copy Link</button></div>
        </div>
      </div>}
    </Modal>

    <Modal open={modal} onClose={()=>setModal(false)} title="👥 Invite Client"
      footer={<><button className="btn btn-p" style={{flex:1}} onClick={addClient}>Send Magic Link ✉️</button><button className="btn btn-ghost" onClick={()=>setModal(false)}>Cancel</button></>}>
      <div className="alert alert-p mb16">✨ Client will get a secure magic link — no password needed.</div>
      <div className="field mb12"><label>Client Name</label><input placeholder="John Smith" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/></div>
      <div className="field mb12"><label>Email</label><input type="email" placeholder="john@company.com" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))}/></div>
      <div className="field mb0"><label>Company (optional)</label><input placeholder="Acme Corp" value={form.company} onChange={e=>setForm(p=>({...p,company:e.target.value}))}/></div>
    </Modal>
  </div>;
}

/* ══════════════════════════════════════
   FILES TAB
══════════════════════════════════════ */
function FilesTab({session,refreshUser}){
  const[modal,setModal]=useState(false);
  const[selectedFile,setSelectedFile]=useState(null);
  const[files,setFiles]=useState([]);
  const[form,setForm]=useState({name:'',size:'',locked:false,project:'',client:'',paymentAmount:'',paymentStatus:'unpaid',previewUrl:'',fileData:null});
  const[previewModal,setPreviewModal]=useState(null); // {f, adminOnly}
  const fileInputRef=React.useRef(null);
  const previewInputRef=React.useRef(null);
  useEffect(()=>{
    (async()=>{
      const users=await DB.getShared('users')||{};
      const u=users[session.user.email];
      setFiles(u?.files||session.user.files||[]);
    })();
  },[session.user.email]);
  const icons={'pdf':'📄','zip':'📦','ai':'🎨','fig':'🖼️','mp4':'🎬','png':'🖼️','jpg':'🖼️','doc':'📝','docx':'📝'};
  const getIcon=f=>{const ext=f.name?.split('.').pop()?.toLowerCase();return icons[ext]||'📎';};

  const save=async(nf)=>{
    const users=await DB.getShared('users')||{};
    users[session.user.email].files=nf;
    await DB.setShared('users',users);
    setFiles(nf);await refreshUser();
  };

  const addFile=async()=>{
    if(!form.name){toast('Enter a file name','r');return;}
    const f={id:`f_${Date.now()}`,name:form.name,size:form.size||'—',locked:form.locked,project:form.project,
      client:form.client||'',paymentAmount:form.paymentAmount||'',paymentStatus:form.paymentStatus||'unpaid',
      addedAt:new Date().toISOString(),previewUrl:form.previewUrl||null,fileData:form.fileData||null};
    await save([...files,f]);
    setModal(false);setForm({name:'',size:'',locked:false,project:'',client:'',paymentAmount:'',paymentStatus:'unpaid',previewUrl:'',fileData:null});
    toast('File added to vault ✓','g');
  };

  const handleFileUpload=e=>{
    const file=e.target.files[0];if(!file)return;
    if(file.size>5*1024*1024){toast('File must be under 5MB for preview','r');return;}
    const reader=new FileReader();
    reader.onload=ev=>{
      const isImg=/\.(png|jpg|jpeg|gif|webp|svg)$/i.test(file.name);
      setForm(p=>({...p,name:p.name||file.name,size:formatFileSize(file.size),
        fileData:ev.target.result,previewUrl:isImg?ev.target.result:null}));
      toast('File loaded ✓','g');
    };
    reader.readAsDataURL(file);
  };

  const handlePreviewUpload=e=>{
    const file=e.target.files[0];if(!file)return;
    if(!/\.(png|jpg|jpeg|gif|webp|svg)$/i.test(file.name)){toast('Preview must be an image','r');return;}
    if(file.size>2*1024*1024){toast('Preview must be under 2MB','r');return;}
    const reader=new FileReader();
    reader.onload=ev=>setForm(p=>({...p,previewUrl:ev.target.result}));
    reader.readAsDataURL(file);
  };

  const formatFileSize=bytes=>{
    if(bytes<1024)return bytes+'B';
    if(bytes<1024*1024)return (bytes/1024).toFixed(1)+'KB';
    return (bytes/1024/1024).toFixed(1)+' MB';
  };

  const updateFilePreview=async(i,key,val)=>{
    const nf=[...files];nf[i][key]=val;await save(nf);
    if(selectedFile?.i===i)setSelectedFile(p=>({...p,f:{...p.f,[key]:val}}));
  };

  const toggleLock=async(i)=>{
    const nf=[...files];nf[i].locked=!nf[i].locked;
    await save(nf);toast(nf[i].locked?'File locked 🔒':'File unlocked ✓',nf[i].locked?'y':'g');
  };

  return<div>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}}>
      <div><div style={{fontSize:20,fontWeight:800}}>File Vault</div><div style={{color:'var(--text2)',fontSize:13}}>{files.length} file{files.length!==1?'s':''} stored</div></div>
      <button className="btn btn-p" onClick={()=>setModal(true)}>↑ Add File</button>
    </div>

    {files.length>0&&<div className="alert alert-y mb16">🔒 Locked files are hidden from clients until payment is confirmed.</div>}

    {files.length===0?<div className="card" style={{textAlign:'center',padding:'50px 20px'}}>
      <div style={{fontSize:40,marginBottom:12}}>🔐</div>
      <div style={{fontWeight:700,marginBottom:6}}>No files yet</div>
      <button className="btn btn-p" style={{marginTop:8}} onClick={()=>setModal(true)}>↑ Upload first file</button>
    </div>:
    files.map((f,i)=><div key={f.id} onClick={()=>setSelectedFile({f,i})} style={{display:'flex',alignItems:'center',gap:12,padding:14,borderRadius:10,border:`1px solid ${selectedFile?.i===i?'var(--p)':'var(--border)'}`,marginBottom:8,opacity:f.locked?.85:1,cursor:'pointer',transition:'border-color .15s'}}
      onMouseOver={e=>e.currentTarget.style.borderColor='var(--p)'}
      onMouseOut={e=>e.currentTarget.style.borderColor=selectedFile?.i===i?'var(--p)':'var(--border)'}>
      <div style={{width:40,height:40,borderRadius:9,background:'var(--bg3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0,overflow:'hidden',position:'relative'}}>
        {f.previewUrl
          ?<img src={f.previewUrl} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
          :<span>{getIcon(f)}</span>}
        {f.locked&&<div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.6)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>🔒</div>}
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</div>
        <div style={{fontSize:11,color:'var(--text3)',marginTop:2,display:'flex',gap:8,flexWrap:'wrap'}}>
          <span>{f.size}</span>
          {f.client&&<span style={{color:'var(--p2)'}}>👤 {f.client}</span>}
          {f.project&&<span>📁 {f.project}</span>}
          {f.paymentAmount&&<span style={{color:f.paymentStatus==='paid'?'var(--g)':'var(--y)'}}>€{f.paymentAmount} {f.paymentStatus==='paid'?'✅ Paid':'⏳ Unpaid'}</span>}
          <span>· {fmtDate(f.addedAt)}</span>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}} onClick={e=>e.stopPropagation()}>
        <span className={`badge ${f.locked?'badge-r':'badge-g'}`}>{f.locked?'🔒 Locked':'✓ Free'}</span>
        {(f.previewUrl||f.fileData)&&<button className="btn btn-ghost btn-sm" title="Preview file" onClick={e=>{e.stopPropagation();setPreviewModal({f,i,adminOnly:false});}}>👁 Preview</button>}
        <button className="btn btn-ghost btn-sm" title={f.locked?'Unlock — client can now download':'Lock — client must pay first'} onClick={()=>toggleLock(i)}>{f.locked?'Unlock':'Lock'}</button>
        <button className="btn btn-ghost btn-sm" style={{color:'var(--r)'}} title="Delete this file permanently" onClick={async()=>{if(!confirm('Delete file?'))return;await save(files.filter((_,j)=>j!==i));toast('File deleted','p');}}>✕</button>
      </div>
    </div>)}

    <Modal open={!!selectedFile} onClose={()=>setSelectedFile(null)} title={`📄 ${selectedFile?.f?.name||''}`}
      footer={<><button className="btn btn-r btn-sm" onClick={async()=>{if(!confirm('Delete this file?'))return;await save(files.filter((_,j)=>j!==selectedFile.i));setSelectedFile(null);toast('File deleted','p');}}>🗑 Delete</button><button className="btn btn-ghost" style={{flex:1}} onClick={()=>setSelectedFile(null)}>Close</button></>}>
      {selectedFile&&<div>
        <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:20,paddingBottom:20,borderBottom:'1px solid var(--border)'}}>
          <div style={{width:56,height:56,borderRadius:12,background:'var(--bg3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,flexShrink:0}}>{getIcon(selectedFile.f)}</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:15,marginBottom:3}}>{selectedFile.f.name}</div>
            <div style={{fontSize:12,color:'var(--text2)'}}>{selectedFile.f.size} · {selectedFile.f.project||'No project'}</div>
            <div style={{fontSize:11,color:'var(--text3)',marginTop:3}}>Added {fmtDate(selectedFile.f.addedAt)}</div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:6,alignItems:'flex-end'}}>
          <span className={`badge ${selectedFile.f.locked?'badge-r':'badge-g'}`} style={{fontSize:12,padding:'4px 10px'}}>{selectedFile.f.locked?'🔒 Locked':'✓ Free'}</span>
          {selectedFile.f.paymentAmount&&<span className={`badge ${selectedFile.f.paymentStatus==='paid'?'badge-g':'badge-y'}`} style={{fontSize:12,padding:'4px 10px'}}>€{selectedFile.f.paymentAmount} {selectedFile.f.paymentStatus==='paid'?'✅ Paid':'⏳ Unpaid'}</span>}
        </div>
        </div>
        {/* Preview section */}
        {selectedFile.f.previewUrl&&<div style={{marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>Preview</div>
          <div style={{borderRadius:10,overflow:'hidden',border:'1px solid var(--border)',position:'relative'}}>
            <img src={selectedFile.f.previewUrl} alt="preview" style={{width:'100%',maxHeight:200,objectFit:'cover',display:'block'}}/>
            {selectedFile.f.locked&&<div style={{position:'absolute',inset:0,backdropFilter:'blur(12px)',background:'rgba(0,0,0,.5)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:8}}>
              <div style={{fontSize:28}}>🔒</div>
              <div style={{fontSize:12,color:'rgba(255,255,255,.7)',fontWeight:600}}>Client sees this blurred preview</div>
            </div>}
          </div>
          <div style={{fontSize:11,color:'var(--text3)',marginTop:6,textAlign:'center'}}>
            {selectedFile.f.locked?'⚠️ Client sees a blurred version of this — they cannot download until they pay':'✓ Client can see and download this preview'}
          </div>
          <div style={{display:'flex',gap:8,marginTop:8}}>
            <button className="btn btn-ghost btn-sm" onClick={()=>setPreviewModal({f:selectedFile.f,i:selectedFile.i,adminOnly:false})}>👁 My view (full)</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>setPreviewModal({f:selectedFile.f,i:selectedFile.i,adminOnly:true})}>👥 Client view (blurred)</button>
          </div>
        </div>}

        {!selectedFile.f.previewUrl&&<div style={{marginBottom:16,padding:'12px 14px',background:'var(--bg3)',borderRadius:9,border:'1px solid var(--border)'}}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:6}}>Add a preview image</div>
          <div style={{fontSize:12,color:'var(--text2)',marginBottom:10}}>Upload a preview image so clients can see a blurred teaser of the file when it is locked.</div>
          <label style={{cursor:'pointer'}}>
            <input type="file" accept="image/*" style={{display:'none'}} onChange={async e=>{
              const file=e.target.files[0];if(!file)return;

              const reader=new FileReader();
              reader.onload=async ev=>{
                await updateFilePreview(selectedFile.i,'previewUrl',ev.target.result);
                toast('Preview image added ✓','g');
              };
              reader.readAsDataURL(file);
            }}/>
            <div className="btn btn-ghost btn-sm" style={{display:'inline-flex'}}>📸 Upload preview image</div>
          </label>
        </div>}

        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
          <div style={{padding:'10px 12px',background:selectedFile.f.locked?'rgba(225,112,85,.07)':'rgba(0,184,148,.07)',borderRadius:9,border:`1px solid ${selectedFile.f.locked?'rgba(225,112,85,.2)':'rgba(0,184,148,.2)'}`,fontSize:12,color:'var(--text2)',lineHeight:1.6}}>

        </div>

          toggleLock(selectedFile.i);
          const nowLocked=!selectedFile.f.locked;
          setSelectedFile(p=>({...p,f:{...p.f,locked:nowLocked}}));
          toast(nowLocked?'File locked 🔒':'File unlocked ✓',nowLocked?'y':'g');

          {selectedFile.f.locked?'🔓 Unlock — give client access':'🔒 Lock — require payment first'}
        </button>
      </div>}
    </Modal>

    {/* Full Preview Modal */}
    {previewModal&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.95)',zIndex:1000,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>

            <div style={{fontSize:12,color:'rgba(255,255,255,.5)',marginTop:3}}>
              {previewModal.adminOnly?'👥 Client view — this is what your client sees':'👁 Admin view — full quality'}
            </div>
          </div>
          <button className="btn btn-ghost" onClick={()=>setPreviewModal(null)} style={{color:'#fff',borderColor:'rgba(255,255,255,.2)'}}>✕ Close</button>

        <div style={{position:'relative',borderRadius:12,overflow:'hidden',border:'1px solid rgba(255,255,255,.1)'}}>

        <div style={{display:'flex',gap:10,marginTop:12,justifyContent:'center'}}>
          <button className="btn btn-ghost btn-sm" style={{color:'#fff',borderColor:'rgba(255,255,255,.2)'}} onClick={()=>setPreviewModal(p=>({...p,adminOnly:false}))}>👁 My view</button>
          <button className="btn btn-ghost btn-sm" style={{color:'#fff',borderColor:'rgba(255,255,255,.2)'}} onClick={()=>setPreviewModal(p=>({...p,adminOnly:true}))}>👥 Client view</button>
        </div>

    <Modal open={modal} onClose={()=>setModal(false)} title="↑ Add File to Vault"

      {form.previewUrl&&<div style={{marginBottom:12,borderRadius:9,overflow:'hidden',border:'1px solid var(--border)'}}>
        <img src={form.previewUrl} alt="" style={{width:'100%',maxHeight:120,objectFit:'cover'}}/>
      </div>}
      <div className="field mb12"><label>File Name</label><input placeholder="final_logo.ai" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
        <div className="field mb0"><label>File Size</label><input placeholder="4.2 MB" value={form.size} onChange={e=>setForm(p=>({...p,size:e.target.value}))}/></div>
        <div className="field mb0"><label>Client</label><input placeholder="TechCorp" value={form.client} onChange={e=>setForm(p=>({...p,client:e.target.value}))}/></div>
      </div>
      <div className="field mb12"><label>Project</label><input placeholder="Brand Identity v2" value={form.project} onChange={e=>setForm(p=>({...p,project:e.target.value}))}/></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
        <div className="field mb0"><label>Payment Amount (€)</label><input type="number" placeholder="1200" value={form.paymentAmount} onChange={e=>setForm(p=>({...p,paymentAmount:e.target.value}))}/></div>
        <div className="field mb0"><label>Payment Status</label>

            <option value="paid">✅ Paid</option>
          </select>

      <div className="field mb0"><label>Access</label>
        <select value={form.locked?'locked':'free'} onChange={e=>setForm(p=>({...p,locked:e.target.value==='locked'}))}>
          <option value="free">Free — client downloads immediately</option>
          <option value="locked">Locked — client sees blurred preview only</option>
        </select>
      </div>
    </Modal>
  </div>;
}

/* ══════════════════════════════════════
   PAYMENTS TAB
══════════════════════════════════════ */
function PaymentsTab({session,refreshUser}){
  const[modal,setModal]=useState(false);
  const[payments,setPayments]=useState([]);
  const[form,setForm]=useState({client:'',amount:'',desc:'',status:'paid'});
  useEffect(()=>{
    (async()=>{
      const users=await DB.getShared('users')||{};
      const u=users[session.user.email];
      setPayments(u?.payments||session.user.payments||[]);
    })();
  },[session.user.email]);

  const[payDetail,setPayDetail]=useState(null);
  const total=payments.filter(p=>p.status==='paid').reduce((s,p)=>s+(p.amount||0),0);
  const pending=payments.filter(p=>p.status==='pending').reduce((s,p)=>s+(p.amount||0),0);

  const save=async(np)=>{
    const users=await DB.getShared('users')||{};
    const earned=np.filter(p=>p.status==='paid').reduce((s,p)=>s+(p.amount||0),0);
    users[session.user.email].payments=np;
    users[session.user.email].totalEarned=earned;
    await DB.setShared('users',users);
    await DB.setShared(`stats:${session.user.email}`,{...((await DB.getShared(`stats:${session.user.email}`))||{}),totalEarned:earned});
    setPayments(np);await refreshUser();
  };

  const addPayment=async()=>{
    if(!form.client||!form.amount){toast('Fill in client and amount','r');return;}
    const p={id:`pay_${Date.now()}`,client:form.client,amount:parseFloat(form.amount)||0,desc:form.desc,status:form.status,date:new Date().toISOString()};
    await save([...payments,p]);
    setModal(false);setForm({client:'',amount:'',desc:'',status:'paid'});
    toast(form.status==='paid'?'Payment recorded ✓':'Invoice created ✓','g');
  };

  const markPaid=async(i)=>{
    const np=[...payments];np[i].status='paid';np[i].paidAt=new Date().toISOString();
    await save(np);toast('Marked as paid ✓','g');
  };

  return<div>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}}>
      <div><div style={{fontSize:20,fontWeight:800}}>Payments</div><div style={{color:'var(--text2)',fontSize:13}}>Track invoices and income</div></div>
      <button className="btn btn-p" onClick={()=>setModal(true)}>+ Add Payment</button>
    </div>

    <div className="grid3 mb24">
      <div className="card" style={{cursor:'pointer',transition:'border-color .15s'}} onClick={()=>setPayDetail('earned')} onMouseOver={e=>e.currentTarget.style.borderColor='var(--g)'} onMouseOut={e=>e.currentTarget.style.borderColor='var(--border)'}>
        <div className="stat-label">Total Earned</div><div className="stat-val" style={{color:'var(--g)'}}>{fmt(total)}</div>
        <div className="stat-delta">All paid invoices · <span style={{color:'var(--g)'}}>View →</span></div>
      </div>
      <div className="card" style={{cursor:'pointer',transition:'border-color .15s'}} onClick={()=>setPayDetail('pending')} onMouseOver={e=>e.currentTarget.style.borderColor='var(--y)'} onMouseOut={e=>e.currentTarget.style.borderColor='var(--border)'}>
        <div className="stat-label">Pending</div><div className="stat-val" style={{color:'var(--y)'}}>{fmt(pending)}</div>
        <div className="stat-delta">{payments.filter(p=>p.status==='pending').length} unpaid · <span style={{color:'var(--y)'}}>View →</span></div>
      </div>
      <div className="card" style={{cursor:'pointer',transition:'border-color .15s'}} onClick={()=>setPayDetail('all')} onMouseOver={e=>e.currentTarget.style.borderColor='var(--p)'} onMouseOut={e=>e.currentTarget.style.borderColor='var(--border)'}>
        <div className="stat-label">Invoices</div><div className="stat-val">{payments.length}</div>
        <div className="stat-delta">Total recorded · <span style={{color:'var(--p2)'}}>View all →</span></div>
      </div>
    </div>
    <Modal open={!!payDetail} onClose={()=>setPayDetail(null)} title={payDetail==='earned'?'💰 Paid Invoices':payDetail==='pending'?'⏳ Pending Payments':'📋 All Invoices'}
      footer={<button className="btn btn-ghost btn-full" onClick={()=>setPayDetail(null)}>Close</button>}>
      <div style={{overflowX:'auto'}}>
        <table className="tbl">
          <thead><tr><th>Client</th><th>Amount</th><th>Desc</th><th>Date</th><th>Status</th><th></th></tr></thead>
          <tbody>{payments.filter(p=>payDetail==='earned'?p.status==='paid':payDetail==='pending'?p.status==='pending':true).slice().reverse().map((p,i)=>{
            const ri=payments.findIndex(x=>x.id===p.id);
            return<tr key={p.id}>
              <td><strong>{p.client}</strong></td>
              <td style={{fontWeight:700,color:p.status==='paid'?'var(--g)':'var(--y)'}}>{fmt(p.amount)}</td>
              <td style={{color:'var(--text2)',fontSize:12}}>{p.desc||'—'}</td>
              <td style={{color:'var(--text3)',fontSize:12}}>{fmtDate(p.date)}</td>
              <td><span className={`badge ${p.status==='paid'?'badge-g':'badge-y'}`}>{p.status}</span></td>
              <td>{p.status==='pending'&&<button className="btn btn-g btn-sm" onClick={()=>markPaid(ri)}>Mark Paid</button>}</td>
            </tr>;
          })}</tbody>
        </table>
        {payments.filter(p=>payDetail==='earned'?p.status==='paid':payDetail==='pending'?p.status==='pending':true).length===0&&<div style={{textAlign:'center',padding:'30px',color:'var(--text3)'}}>No {payDetail} payments yet</div>}
      </div>
    </Modal>

    {payments.length===0?<div className="card" style={{textAlign:'center',padding:'50px 20px'}}>
      <div style={{fontSize:40,marginBottom:12}}>💳</div>
      <div style={{fontWeight:700,marginBottom:6}}>No payments yet</div>
      <button className="btn btn-p" style={{marginTop:8}} onClick={()=>setModal(true)}>+ Record first payment</button>
    </div>:
    <div className="card"><div style={{overflowX:'auto'}}><table className="tbl">
      <thead><tr><th>Client</th><th>Amount</th><th>Description</th><th>Date</th><th>Status</th><th></th></tr></thead>
      <tbody>{payments.slice().reverse().map((p,i)=>{
        const ri=payments.length-1-i;
        return<tr key={p.id}>
          <td><strong>{p.client}</strong></td>
          <td style={{fontWeight:700,color:p.status==='paid'?'var(--g)':'var(--y)'}}>{fmt(p.amount)}</td>
          <td style={{color:'var(--text2)',fontSize:12}}>{p.desc||'—'}</td>
          <td style={{color:'var(--text3)',fontSize:12}}>{fmtDate(p.date)}</td>
          <td><span className={`badge ${p.status==='paid'?'badge-g':'badge-y'}`}>{p.status}</span></td>
          <td>{p.status==='pending'&&<button className="btn btn-g btn-sm" onClick={()=>markPaid(ri)}>Mark Paid</button>}</td>
        </tr>;
      })}</tbody>
    </table></div></div>}

    <Modal open={modal} onClose={()=>setModal(false)} title="💳 Record Payment"
      footer={<><button className="btn btn-p" style={{flex:1}} onClick={addPayment}>Save</button><button className="btn btn-ghost" onClick={()=>setModal(false)}>Cancel</button></>}>
      <div className="field mb12"><label>Client Name</label><input placeholder="TechCorp" value={form.client} onChange={e=>setForm(p=>({...p,client:e.target.value}))}/></div>
      <div className="field mb12"><label>Amount (€)</label><input type="number" placeholder="1200" value={form.amount} onChange={e=>setForm(p=>({...p,amount:e.target.value}))}/></div>
      <div className="field mb12"><label>Description (optional)</label><input placeholder="Brand identity final invoice" value={form.desc} onChange={e=>setForm(p=>({...p,desc:e.target.value}))}/></div>
      <div className="field mb0"><label>Status</label>
        <select value={form.status} onChange={e=>setForm(p=>({...p,status:e.target.value}))}>
          <option value="paid">Paid</option><option value="pending">Pending / Invoice</option>
        </select>
      </div>
    </Modal>
  </div>;
}

/* ══════════════════════════════════════
   WITHDRAW TAB
══════════════════════════════════════ */
function WithdrawTab({session,refreshUser}){
  const[amount,setAmount]=useState('');
  const[method,setMethod]=useState('paypal');
  const[dest,setDest]=useState('');
  const[withdrawals,setWithdrawals]=useState([]);
  const[busy,setBusy]=useState(false);
  const[wdDetail,setWdDetail]=useState(null);
  useEffect(()=>{
    (async()=>{
      const users=await DB.getShared('users')||{};
      const u=users[session.user.email];
      setWithdrawals(u?.withdrawals||session.user.withdrawals||[]);
    })();
  },[session.user.email]);

  const[earned,setEarned]=useState(session.user.totalEarned||0);
  useEffect(()=>{
    (async()=>{
      const users=await DB.getShared('users')||{};
      const u=users[session.user.email];
      setEarned(u?.totalEarned||session.user.totalEarned||0);
    })();
  },[session.user.email,withdrawals]);
  const withdrawn=withdrawals.filter(w=>w.status==='sent').reduce((s,w)=>s+(w.net||0),0);
  const available=Math.max(0,earned-withdrawn);

  const methods={
    paypal:{label:'PayPal',icon:'🅿️',fee:0.029,fixed:0,min:10,eta:'Instant',dest:'PayPal Email',ph:'your@paypal.com'},
    bank:{label:'Bank (SEPA)',icon:'🏦',fee:0,fixed:0,min:50,eta:'1–3 days',dest:'IBAN',ph:'RS35 2600 0560…'},
    wise:{label:'Wise',icon:'🟢',fee:0.005,fixed:0,min:10,eta:'Same day',dest:'Wise Email',ph:'your@wise.com'},
    revolut:{label:'Revolut',icon:'🔵',fee:0,fixed:0,min:5,eta:'Instant',dest:'Tag / Phone',ph:'@yourtag'},
    crypto:{label:'Crypto',icon:'₿',fee:0,fixed:2,min:20,eta:'Network',dest:'Wallet Address',ph:'0x… or bc1…'},
  };

  const m=methods[method];
  const raw=parseFloat(amount)||0;
  const fee=+(raw*m.fee+m.fixed).toFixed(2);
  const net=+(raw-fee).toFixed(2);
  const valid=raw>=m.min&&raw<=available&&dest.trim().length>0&&net>0;

  const submit=async()=>{
    if(!valid)return;
    setBusy(true);
    const w={id:`w_${Date.now()}`,amount:raw,fee,net,method:m.label,dest,eta:m.eta,date:new Date().toISOString(),status:'processing'};
    const nw=[w,...withdrawals];
    const users=await DB.getShared('users')||{};
    users[session.user.email].withdrawals=nw;
    users[session.user.email].totalSpent=(users[session.user.email].totalSpent||0)+raw;
    await DB.setShared('users',users);
    await DB.setShared(`stats:${session.user.email}`,{...((await DB.getShared(`stats:${session.user.email}`))||{}),totalSpent:(session.user.totalSpent||0)+raw});
    setWithdrawals(nw);
    await refreshUser();
    toast(`💸 Withdrawal of ${fmt(net)} submitted via ${m.label}`,'g');
    setAmount('');setDest('');setBusy(false);
    // Simulate sent after 3s
    setTimeout(async()=>{
      nw[0].status='sent';
      const u2=await DB.getShared('users')||{};
      u2[session.user.email].withdrawals=nw;
      await DB.setShared('users',u2);
      setWithdrawals([...nw]);
      toast(`✅ ${m.label} transfer sent!`,'g');
    },3000);
  };

  return<div>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}}>
      <div><div style={{fontSize:20,fontWeight:800}}>Withdrawal</div><div style={{color:'var(--text2)',fontSize:13}}>Transfer earnings to your account</div></div>
      <span className="badge badge-g" style={{padding:'6px 14px',fontSize:13}}>Available: {fmt(available)}</span>
    </div>

    <div className="grid3 mb24">
      <div className="card" style={{cursor:'pointer',transition:'border-color .15s'}} onClick={()=>setWdDetail('available')} onMouseOver={e=>e.currentTarget.style.borderColor='var(--g)'} onMouseOut={e=>e.currentTarget.style.borderColor='var(--border)'}>
        <div className="stat-label">Available</div><div className="stat-val" style={{color:'var(--g)'}}>{fmt(available)}</div>
        <div className="stat-delta">Ready to withdraw · <span style={{color:'var(--g)'}}>Details →</span></div>
      </div>
      <div className="card" style={{cursor:'pointer',transition:'border-color .15s'}} onClick={()=>setWdDetail('earned')} onMouseOver={e=>e.currentTarget.style.borderColor='var(--p)'} onMouseOut={e=>e.currentTarget.style.borderColor='var(--border)'}>
        <div className="stat-label">Total Earned</div><div className="stat-val">{fmt(earned)}</div>
        <div className="stat-delta">All paid invoices · <span style={{color:'var(--p2)'}}>Details →</span></div>
      </div>
      <div className="card" style={{cursor:'pointer',transition:'border-color .15s'}} onClick={()=>setWdDetail('history')} onMouseOver={e=>e.currentTarget.style.borderColor='var(--b)'} onMouseOut={e=>e.currentTarget.style.borderColor='var(--border)'}>
        <div className="stat-label">Total Withdrawn</div><div className="stat-val">{fmt(withdrawn)}</div>
        <div className="stat-delta">All time · <span style={{color:'var(--b)'}}>View history →</span></div>
      </div>
    </div>
    <Modal open={!!wdDetail} onClose={()=>setWdDetail(null)}
      title={wdDetail==='available'?'💰 Available Balance':wdDetail==='earned'?'📈 Total Earned':'📋 Withdrawal History'}
      footer={<button className="btn btn-ghost btn-full" onClick={()=>setWdDetail(null)}>Close</button>}>
      {wdDetail==='available'&&<div>
        <div style={{textAlign:'center',padding:'16px 0 20px'}}>
          <div style={{fontSize:44,fontWeight:900,color:'var(--g)'}}>{fmt(available)}</div>
          <div style={{fontSize:13,color:'var(--text2)',marginTop:6}}>Available for immediate withdrawal</div>
        </div>
        <div style={{background:'var(--bg3)',borderRadius:9,padding:14,fontSize:13}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}><span style={{color:'var(--text3)'}}>Total Earned</span><span style={{fontWeight:700,color:'var(--g)'}}>{fmt(earned)}</span></div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}><span style={{color:'var(--text3)'}}>Total Withdrawn</span><span style={{fontWeight:700,color:'var(--p2)'}}>-{fmt(withdrawn)}</span></div>
          <div style={{height:1,background:'var(--border)',margin:'8px 0'}}/>
          <div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontWeight:700}}>Available</span><span style={{fontWeight:900,color:'var(--g)',fontSize:16}}>{fmt(available)}</span></div>
        </div>
        <button className="btn btn-g btn-full" style={{marginTop:16}} onClick={()=>setWdDetail(null)}>← Go Withdraw</button>
      </div>}
      {wdDetail==='earned'&&<div>
        <div style={{textAlign:'center',padding:'16px 0 20px'}}>
          <div style={{fontSize:44,fontWeight:900,color:'var(--p2)'}}>{fmt(earned)}</div>
          <div style={{fontSize:13,color:'var(--text2)',marginTop:6}}>Total earned from all paid invoices</div>
        </div>
        <div style={{background:'var(--bg3)',borderRadius:9,padding:14,fontSize:13}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}><span style={{color:'var(--text3)'}}>Available to withdraw</span><span style={{color:'var(--g)',fontWeight:700}}>{fmt(available)}</span></div>
          <div style={{display:'flex',justifyContent:'space-between'}}><span style={{color:'var(--text3)'}}>Already withdrawn</span><span style={{color:'var(--p2)',fontWeight:700}}>{fmt(withdrawn)}</span></div>
        </div>
      </div>}
      {wdDetail==='history'&&<div>
        {withdrawals.length===0?<div style={{textAlign:'center',padding:'30px',color:'var(--text3)'}}>No withdrawals yet</div>:
        withdrawals.map(w=><div key={w.id} style={{display:'flex',alignItems:'center',gap:12,padding:12,borderRadius:9,border:'1px solid var(--border)',marginBottom:8}}>
          <div style={{width:36,height:36,borderRadius:8,background:w.status==='sent'?'var(--g2)':'var(--y2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>{w.status==='sent'?'✅':'⏳'}</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:13}}>{fmt(w.net)} via {w.method}</div>
            <div style={{fontSize:11,color:'var(--text3)'}}>{w.dest} · {fmtDate(w.date)}</div>
          </div>
          <span className={`badge ${w.status==='sent'?'badge-g':'badge-y'}`}>{w.status==='sent'?'Sent':'Processing'}</span>
        </div>)}
        <div style={{background:'var(--bg3)',borderRadius:9,padding:12,marginTop:8,display:'flex',justifyContent:'space-between',fontSize:13}}>
          <span style={{color:'var(--text3)'}}>Total withdrawn</span>
          <span style={{fontWeight:800,color:'var(--p2)'}}>{fmt(withdrawn)}</span>
        </div>
      </div>}
    </Modal>

    <div className="grid2">
      <div className="card">
        <div style={{fontWeight:700,marginBottom:16}}>New Withdrawal</div>
        <div className="field mb12">
          <label>Amount (€)</label>
          <div style={{position:'relative'}}>
            <span style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',fontWeight:700,color:'var(--text2)'}}>€</span>
            <input type="number" placeholder="0" min={m.min} max={available} value={amount} onChange={e=>setAmount(e.target.value)} style={{paddingLeft:30,fontSize:18,fontWeight:700}}/>
          </div>
          <div style={{display:'flex',gap:6,marginTop:8}}>
            {[100,500,1000].map(v=><button key={v} className="btn btn-ghost btn-sm" onClick={()=>setAmount(String(Math.min(v,available)))}>{fmt(v)}</button>)}
            <button className="btn btn-ghost btn-sm" onClick={()=>setAmount(String(available))}>All</button>
          </div>
        </div>

        <div style={{fontWeight:600,fontSize:12,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:8}}>Method</div>
        {Object.entries(methods).map(([k,mv])=><div key={k} onClick={()=>setMethod(k)} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 14px',borderRadius:9,border:`2px solid ${method===k?'var(--p)':'var(--border)'}`,background:method===k?'var(--p3)':'transparent',cursor:'pointer',marginBottom:7,transition:'all .15s'}}>
          <span style={{fontSize:22}}>{mv.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:700}}>{mv.label}</div>
            <div style={{fontSize:11,color:'var(--text3)'}}>{mv.eta} · {mv.fee>0?`${(mv.fee*100).toFixed(1)}% fee`:mv.fixed>0?`€${mv.fixed} fee`:'No fee'} · Min €{mv.min}</div>
          </div>
          {method===k&&<span style={{color:'var(--p2)',fontWeight:800}}>✓</span>}
        </div>)}

        <div className="field mb12" style={{marginTop:8}}><label>{m.dest}</label><input placeholder={m.ph} value={dest} onChange={e=>setDest(e.target.value)}/></div>

        {raw>=m.min&&net>0&&<div style={{background:'var(--bg3)',borderRadius:9,padding:12,marginBottom:14,fontSize:13}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}><span style={{color:'var(--text2)'}}>Amount</span><span>{fmt(raw)}</span></div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}><span style={{color:'var(--text2)'}}>Fee</span><span style={{color:fee>0?'var(--y)':'var(--g)'}}>{fee>0?`-€${fee}`:'Free'}</span></div>
          <div style={{height:1,background:'var(--border)',margin:'8px 0'}}/>
          <div style={{display:'flex',justifyContent:'space-between',fontWeight:700}}><span>You receive</span><span style={{color:'var(--g)',fontSize:16}}>{fmt(net)}</span></div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:6,fontSize:11,color:'var(--text3)'}}><span>ETA</span><span>{m.eta}</span></div>
        </div>}

        <button className="btn btn-g btn-full" style={{fontSize:14,padding:12}} onClick={submit} disabled={!valid||busy}>{busy?'Processing…':'💸 Request Withdrawal'}</button>
        <div style={{textAlign:'center',fontSize:11,color:'var(--text3)',marginTop:8}}>Demo mode — no real transfers</div>
      </div>

      <div className="card">
        <div style={{fontWeight:700,marginBottom:16}}>Withdrawal History</div>
        {withdrawals.length===0?<div style={{textAlign:'center',padding:'40px 20px',color:'var(--text3)'}}>
          <div style={{fontSize:36,marginBottom:10}}>💸</div>No withdrawals yet
        </div>:withdrawals.map(w=><div key={w.id} style={{display:'flex',alignItems:'center',gap:12,padding:12,borderRadius:9,border:'1px solid var(--border)',marginBottom:8}}>
          <div style={{width:36,height:36,borderRadius:8,background:w.status==='sent'?'var(--g2)':'var(--y2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>{w.status==='sent'?'✅':'⏳'}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:700}}>{fmt(w.net)} via {w.method}</div>
            <div style={{fontSize:11,color:'var(--text3)',marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{w.dest} · {fmtDate(w.date)}</div>
          </div>
          <span className={`badge ${w.status==='sent'?'badge-g':'badge-y'}`}>{w.status==='sent'?'Sent':'Processing'}</span>
        </div>)}
      </div>
    </div>
  </div>;
}

        <div style={{border:'1px solid var(--border)',borderRadius:10,overflow:'hidden',marginBottom:14}}>
          <div style={{background:'var(--bg3)',padding:'10px 14px',borderBottom:'1px solid var(--border)',fontSize:11}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
              <span style={{color:'var(--text3)'}}>From</span><span style={{color:'var(--text2)'}}>{sel.from}</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
              <span style={{color:'var(--text3)'}}>To</span><span style={{color:'var(--text2)'}}>{sel.client} &lt;{sel.to}&gt;</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between'}}>
              <span style={{color:'var(--text3)'}}>Subject</span><span style={{fontWeight:700}}>{sel.subject}</span>

        </div>
      </div>}
    </div>
  </div>;
}

function BrandingTab({session,refreshUser,onBrandingSaved}){
  const isAgency=session.user.plan==='agency'||session.user.isSuperAdmin;
  const[name,setName]=useState('');
  const[primary,setPrimary]=useState('#6c5ce7');
  const[accent,setAccent]=useState('#a29bfe');
  const[removePowered,setRemovePowered]=useState(true);
  const[domain,setDomain]=useState('');
  const[logoPreview,setLogoPreview]=useState(null);
  const[saved,setSaved]=useState(false);

  useEffect(()=>{
    (async()=>{
      const b=await DB.get('branding');
      if(b){setName(b.name||'');setPrimary(b.primary||'#6c5ce7');setAccent(b.accent||'#a29bfe');setRemovePowered(b.removePowered!==false);setDomain(b.domain||'');setLogoPreview(b.logo||null);}
    })();
  },[]);

  const handleLogo=e=>{
    const f=e.target.files[0];if(!f)return;
    if(f.size>2*1024*1024){toast('Logo must be under 2MB','r');return;}
    const r=new FileReader();
    r.onload=ev=>setLogoPreview(ev.target.result);
    r.readAsDataURL(f);
  };

  const save=async()=>{
    const b={name,primary,accent,removePowered,domain,logo:logoPreview};
    await DB.set('branding',b);
    // Apply colors live
    document.documentElement.style.setProperty('--p',primary);
    document.documentElement.style.setProperty('--p2',accent);
    setSaved(true);setTimeout(()=>setSaved(false),2000);
    if(onBrandingSaved)onBrandingSaved(); // tell AdminApp to reload branding
    toast('Branding saved & applied ✓','g');
  };

  const reset=async()=>{
    await DB.set('branding',null);
    setName('');setPrimary('#6c5ce7');setAccent('#a29bfe');setRemovePowered(true);setDomain('');setLogoPreview(null);
    document.documentElement.style.setProperty('--p','#6c5ce7');
    document.documentElement.style.setProperty('--p2','#a29bfe');
    if(onBrandingSaved)onBrandingSaved();
    toast('Branding reset to defaults','p');
  };

  if(!isAgency)return<div>
    <div style={{marginBottom:24}}><div style={{fontSize:20,fontWeight:800}}>White-Label Branding</div></div>
    <div className="card" style={{textAlign:'center',padding:'50px 20px'}}>
      <div style={{fontSize:40,marginBottom:12}}>🏢</div>
      <div style={{fontWeight:700,fontSize:16,marginBottom:6}}>Agency Plan Required</div>
      <div style={{color:'var(--text2)',fontSize:13,marginBottom:20}}>Upload your logo, set brand colors, and remove all Shadow branding from client portals.</div>
      <button className="btn btn-p">Upgrade to Agency — €150/mo</button>
    </div>
  </div>;

  return<div>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}}>
      <div><div style={{fontSize:20,fontWeight:800}}>White-Label Branding</div><div style={{color:'var(--g)',fontSize:13}}>Agency Plan — Active ✓</div></div>
      <button className="btn btn-ghost btn-sm" onClick={reset}>↺ Reset to Default</button>
    </div>
    <div className="alert alert-g mb20">✅ Changes apply instantly to the portal. Your clients will see your branding.</div>

    <div className="grid2">
      <div style={{display:'flex',flexDirection:'column',gap:16}}>
        {/* Logo upload */}
        <div className="card">
          <div style={{fontWeight:700,marginBottom:14}}>Logo</div>
          {logoPreview
            ?<div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10,marginBottom:14}}>
               <img src={logoPreview} alt="logo" style={{maxWidth:120,maxHeight:60,objectFit:'contain',borderRadius:8}}/>
               <button className="btn btn-ghost btn-sm" style={{color:'var(--r)'}} onClick={()=>setLogoPreview(null)}>✕ Remove</button>
             </div>
            :<label style={{display:'block',border:'2px dashed var(--border2)',borderRadius:10,padding:'28px',textAlign:'center',cursor:'pointer',marginBottom:14,transition:'border-color .15s'}} onMouseOver={e=>e.currentTarget.style.borderColor='var(--p)'} onMouseOut={e=>e.currentTarget.style.borderColor='var(--border2)'}>
               <input type="file" accept="image/*" style={{display:'none'}} onChange={handleLogo}/>
               <div style={{fontSize:28,marginBottom:8}}>☁️</div>
               <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>Drop logo here or click</div>

             </label>
          }
          <div className="field mb0"><label>Studio / Company Name</label><input placeholder="My Studio" value={name} onChange={e=>setName(e.target.value)}/></div>
        </div>

        {/* Colors */}
        <div className="card">
          <div style={{fontWeight:700,marginBottom:14}}>Brand Colors</div>
          <div className="field mb12">
            <label>Primary Color</label>
            <div style={{display:'flex',gap:10,alignItems:'center'}}>
              <input type="color" value={primary} onChange={e=>setPrimary(e.target.value)} style={{width:46,height:38,borderRadius:8,border:'1px solid var(--border)',cursor:'pointer',padding:2,background:'var(--bg3)'}}/>
              <input value={primary} onChange={e=>/^#[0-9a-fA-F]{6}$/.test(e.target.value)&&setPrimary(e.target.value)} style={{flex:1,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:9,padding:'9px 14px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:13,outline:'none'}} maxLength={7}/>
            </div>

          <div className="field mb12">

            <div style={{display:'flex',gap:10,alignItems:'center'}}>
              <input type="color" value={accent} onChange={e=>setAccent(e.target.value)} style={{width:46,height:38,borderRadius:8,border:'1px solid var(--border)',cursor:'pointer',padding:2,background:'var(--bg3)'}}/>
              <input value={accent} onChange={e=>/^#[0-9a-fA-F]{6}$/.test(e.target.value)&&setAccent(e.target.value)} style={{flex:1,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:9,padding:'9px 14px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:13,outline:'none'}} maxLength={7}/>
            </div>
          </div>
          <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:13,marginBottom:12}}>
            <input type="checkbox" checked={removePowered} onChange={e=>setRemovePowered(e.target.checked)} style={{width:15,height:15,accentColor:'var(--p)',cursor:'pointer'}}/>
            Remove "Powered by Shadow" footer
          </label>
          <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:9,padding:'12px 14px'}}>
            <div style={{fontSize:12,fontWeight:700,color:'var(--text2)',marginBottom:8}}>🌐 Custom Domain</div>
            <div style={{fontSize:12,color:'var(--text3)',lineHeight:1.7,marginBottom:10}}>
              To use <strong style={{color:'var(--text2)'}}>yourcompany.com</strong> instead of the Netlify URL:
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:6,fontSize:12,color:'var(--text2)'}}>
              <div style={{display:'flex',gap:8}}><span style={{color:'var(--p2)',fontWeight:700,flexShrink:0}}>1.</span><span>Buy a domain on <strong>Namecheap.com</strong> or <strong>Google Domains</strong> (~€10/yr)</span></div>
              <div style={{display:'flex',gap:8}}><span style={{color:'var(--p2)',fontWeight:700,flexShrink:0}}>2.</span><span>In Netlify → Site Settings → Domain Management → Add custom domain</span></div>
              <div style={{display:'flex',gap:8}}><span style={{color:'var(--p2)',fontWeight:700,flexShrink:0}}>3.</span><span>Add a <strong>CNAME record</strong> in your domain DNS pointing to your Netlify URL</span></div>
              <div style={{display:'flex',gap:8}}><span style={{color:'var(--p2)',fontWeight:700,flexShrink:0}}>4.</span><span>Netlify sets up HTTPS automatically — done in ~5 minutes</span></div>

        <div style={{border:'1px solid var(--border)',borderRadius:12,overflow:'hidden',background:'var(--bg)'}}>

            <div style={{fontSize:11,color:'var(--text3)',marginBottom:6}}>Active Project</div>

/* ══════════════════════════════════════
   MESSAGES TAB
══════════════════════════════════════ */
function MessagesTab({session,users}){
  const[activeConvo,setActiveConvo]=useState(null);
  const[input,setInput]=useState('');
  const[allConvos,setAllConvos]=useState({});
  const[unread,setUnread]=useState({});
  const[msgProfile,setMsgProfile]=useState(null);
  const[msgRatings,setMsgRatings]=useState({});
  const[ratingTarget,setRatingTarget]=useState(null);
  const inputRef=React.useRef(null);
  const bottomRef=React.useRef(null);

  // Load ratings once
  useEffect(()=>{(async()=>{const r=await DB.getShared('marketplace:ratings')||{};setMsgRatings(r);})();},[]);

  const myEmail=session.user.email;

  // Build conversation list from all users
  const otherUsers=Object.entries(users).filter(([email])=>email!==myEmail).map(([email,u])=>({email,name:u.name,studio:u.studio,plan:u.plan,initials:initials(u.name)}));

  // Load all conversations
  useEffect(()=>{
    (async()=>{
      const convos={};
      const unreadMap={};
      for(const u of otherUsers){
        const key=convoKey(myEmail,u.email);
        const msgs=await DB.getShared(`convo:${key}`)||[];
        convos[u.email]=msgs;
        const lastRead=await DB.get(`read:${key}`)||0;
        unreadMap[u.email]=msgs.filter(m=>m.from!==myEmail&&m.ts>lastRead).length;
      }
      setAllConvos(convos);
      setUnread(unreadMap);
    })();
  },[myEmail,Object.keys(users).join(',')]);

  // Poll for new messages every 5s
  useEffect(()=>{
    const tick=async()=>{
      if(!activeConvo)return;
      const key=convoKey(myEmail,activeConvo);
      const msgs=await DB.getShared(`convo:${key}`)||[];
      setAllConvos(p=>({...p,[activeConvo]:msgs}));
      scrollBottom();
    };
    const i=setInterval(tick,5000);
    return()=>clearInterval(i);
  },[activeConvo,myEmail]);

  const convoKey=(a,b)=>[a,b].sort().join('__').replace(/[@.]/g,'_');

  const openConvo=async(email)=>{
    setActiveConvo(email);
    // Mark as read
    const key=convoKey(myEmail,email);
    await DB.set(`read:${key}`,Date.now());
    setUnread(p=>({...p,[email]:0}));
    setTimeout(scrollBottom,100);
    setTimeout(()=>inputRef.current?.focus(),100);
  };

  const scrollBottom=()=>bottomRef.current?.scrollIntoView({behavior:'smooth'});

  const sendMsg=async()=>{
    const text=input.trim();
    if(!text||!activeConvo)return;
    setInput('');
    const key=convoKey(myEmail,activeConvo);
    const existing=await DB.getShared(`convo:${key}`)||[];
    const msg={id:`msg_${Date.now()}`,from:myEmail,fromName:session.user.name,text,ts:Date.now()};
    const updated=[...existing,msg];
    await DB.setShared(`convo:${key}`,updated);
    setAllConvos(p=>({...p,[activeConvo]:updated}));
    setTimeout(scrollBottom,50);
  };

  const totalUnread=Object.values(unread).reduce((s,n)=>s+n,0);
  const activeUser=activeConvo?users[activeConvo]:null;
  const msgs=activeConvo?allConvos[activeConvo]||[]:[];

  const[showChat,setShowChat]=useState(false);
  return<div className="msg-layout" style={{display:'flex',height:'calc(100vh - 56px)',gap:0,margin:'-28px',overflow:'hidden'}}>
    {/* Sidebar: conversation list */}
    <div className="msg-sidebar" style={{width:280,borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',flexShrink:0,background:'var(--bg2)',display:showChat?'none':'flex'}}>
      <div style={{padding:'20px 16px 14px',borderBottom:'1px solid var(--border)'}}>
        <div style={{fontSize:18,fontWeight:800,marginBottom:2}}>💬 Messages</div>
        <div style={{fontSize:12,color:'var(--text3)'}}>{otherUsers.length} conversation{otherUsers.length!==1?'s':''}{totalUnread>0?` · ${totalUnread} unread`:''}</div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'8px'}}>
        {otherUsers.length===0?<div style={{padding:20,textAlign:'center',color:'var(--text3)',fontSize:13}}>No other users yet.<br/>Seed demo users to test.</div>:
        otherUsers.map(u=>{
          const lastMsg=(allConvos[u.email]||[]).slice(-1)[0];
          const hasUnread=(unread[u.email]||0)>0;
          return<div key={u.email} onClick={()=>openConvo(u.email)} style={{display:'flex',alignItems:'center',gap:10,padding:'11px 10px',borderRadius:10,cursor:'pointer',background:activeConvo===u.email?'var(--p3)':'transparent',border:`1px solid ${activeConvo===u.email?'var(--p)':'transparent'}`,marginBottom:3,transition:'all .12s'}}
            onMouseOver={e=>{if(activeConvo!==u.email)e.currentTarget.style.background='var(--bg3)'}}
            onMouseOut={e=>{if(activeConvo!==u.email)e.currentTarget.style.background='transparent'}}>
            <div style={{width:38,height:38,borderRadius:'50%',background:'linear-gradient(135deg,var(--p),var(--p2))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:800,color:'#fff',flexShrink:0,position:'relative'}}>
              {u.initials}
              {hasUnread&&<div style={{position:'absolute',top:-2,right:-2,width:10,height:10,borderRadius:'50%',background:'var(--r)',border:'2px solid var(--bg2)'}}/>}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <span style={{fontWeight:hasUnread?800:600,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.name}</span>
                {lastMsg&&<span style={{fontSize:10,color:'var(--text3)',flexShrink:0,marginLeft:4}}>{new Date(lastMsg.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>}
              </div>
              <div style={{fontSize:11,color:hasUnread?'var(--text2)':'var(--text3)',marginTop:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:hasUnread?600:400}}>
                {lastMsg?`${lastMsg.from===myEmail?'You: ':''}${lastMsg.text}`:u.studio||'Start a conversation'}
              </div>
              {unread[u.email]>0&&<span style={{display:'inline-block',background:'var(--r)',color:'#fff',borderRadius:99,fontSize:10,fontWeight:800,padding:'1px 6px',marginTop:3}}>{unread[u.email]}</span>}
            </div>
          </div>;
        })}
      </div>
    </div>

    {/* Chat area */}
    <div style={{flex:1,display:'flex',flexDirection:'column',background:'var(--bg)'}}>
      {!activeConvo?<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:'var(--text3)'}}>
        <div style={{fontSize:48,marginBottom:12}}>💬</div>
        <div style={{fontWeight:700,fontSize:16,marginBottom:6,color:'var(--text2)'}}>Select a conversation</div>
        <div style={{fontSize:13}}>Choose someone from the left to start messaging</div>
      </div>:<>
        {/* Header */}
        <div style={{padding:'12px 20px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:12,background:'var(--bg2)'}}>
          <button onClick={()=>{setActiveConvo(null);}} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:7,width:30,height:30,display:'none',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'var(--text2)',fontSize:14}} className="mob-back">←</button>
          {/* Clickable avatar — opens profile */}
          <div style={{display:'flex',alignItems:'center',gap:10,flex:1,cursor:'pointer',padding:'4px 8px',borderRadius:10,transition:'background .12s'}}
            onClick={()=>setMsgProfile(activeUser)}
            onMouseOver={e=>e.currentTarget.style.background='var(--bg3)'}
            onMouseOut={e=>e.currentTarget.style.background='transparent'}>
            <div style={{position:'relative',flexShrink:0}}>
              <div style={{width:38,height:38,borderRadius:'50%',background:'linear-gradient(135deg,var(--p),var(--p2))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:800,color:'#fff'}}>{initials(activeUser?.name||'')}</div>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontWeight:700,fontSize:14}}>{activeUser?.name}</span>
                {(()=>{const r=msgRatings[activeConvo];return r&&r.count>0?<span style={{fontSize:12,color:'var(--y)',fontWeight:700}}>⭐ {r.avg.toFixed(1)} <span style={{color:'var(--text3)',fontWeight:400}}>({r.count})</span></span>:null;})()}
                {(()=>{const r=msgRatings[activeConvo];return r&&r.flagged>0?<span style={{background:'rgba(239,68,68,.15)',color:'var(--r)',borderRadius:99,padding:'1px 7px',fontSize:10,fontWeight:700}}>🚩 {r.flagged}</span>:null;})()}
              </div>
              <div style={{fontSize:11,color:'var(--text3)'}}>{activeUser?.studio} · {(activeUser?.plan||'free').toUpperCase()} · <span style={{color:'var(--p2)'}}>View profile →</span></div>
            </div>
          </div>
          <button onClick={()=>setActiveConvo(null)} style={{background:'transparent',border:'none',cursor:'pointer',color:'var(--text3)',fontSize:18,flexShrink:0}}>✕</button>
        </div>

        {/* Profile Modal */}
        {msgProfile&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.8)',zIndex:900,display:'flex',alignItems:'center',justifyContent:'center',padding:16,backdropFilter:'blur(8px)'}} onClick={()=>setMsgProfile(null)}>
          <div style={{background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:20,width:'100%',maxWidth:500,maxHeight:'90vh',overflow:'auto',animation:'modalIn .18s ease'}} onClick={e=>e.stopPropagation()}>
            {/* Cover */}
            <div style={{height:72,background:'linear-gradient(135deg,var(--p),var(--p2))',borderRadius:'20px 20px 0 0',position:'relative'}}>
