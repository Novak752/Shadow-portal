            </div>
            <div style={{padding:'34px 20px 20px'}}>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:14}}>

                  <div style={{fontSize:19,fontWeight:800}}>{msgProfile.name}</div>
                  <div style={{fontSize:13,color:'var(--text3)',marginTop:2}}>{msgProfile.studio}</div>

/* ── RATE FORM COMPONENT ── */
function RateForm({target,session,ratings,setRatings,onClose}){
  const[stars,setStars]=useState(0);
  const[hover,setHover]=useState(0);
  const[review,setReview]=useState('');
  const[busy,setBusy]=useState(false);

  // Check if already rated
  const myKey=`${session.user.email}→${target.authorEmail}`;
  const alreadyRated=ratings[target.authorEmail]?.reviews?.some(r=>r.from===session.user.email);

  const submit=async()=>{
    if(stars===0){toast('Please select a star rating','r');return;}
    setBusy(true);
    const all=await DB.getShared('marketplace:ratings')||{};
    const existing=all[target.authorEmail]||{count:0,total:0,avg:0,flagged:0,reviews:[]};
    // Prevent double rating
    if(existing.reviews?.some(r=>r.from===session.user.email)){
      toast('You already rated this user','r');setBusy(false);return;
    }
    const newReviews=[...(existing.reviews||[]),{from:session.user.email,fromName:session.user.name,stars,review:review.trim(),ts:Date.now()}];
    const newTotal=existing.total+stars;
    const newCount=existing.count+1;
    all[target.authorEmail]={...existing,count:newCount,total:newTotal,avg:+(newTotal/newCount).toFixed(1),reviews:newReviews};
    await DB.setShared('marketplace:ratings',all);
    setRatings(all);
    toast(`⭐ Review submitted for ${target.authorName}`,'g');
    setBusy(false);onClose();
  };

  const labels=['','Terrible','Poor','Okay','Good','Excellent'];

  return<div style={{padding:'16px 20px 20px'}}>
    {alreadyRated?<div style={{textAlign:'center',padding:'20px 0'}}>
      <div style={{fontSize:32,marginBottom:8}}>✅</div>
      <div style={{fontWeight:700,marginBottom:4}}>Already rated</div>
      <div style={{fontSize:13,color:'var(--text3)'}}>You have already submitted a review for this user.</div>
      <button className="btn btn-ghost btn-full" style={{marginTop:16}} onClick={onClose}>Close</button>
    </div>:<>
      <div style={{fontSize:13,color:'var(--text2)',marginBottom:16}}>Re: <strong>{target.postTitle}</strong></div>
      {/* Stars */}
      <div style={{display:'flex',justifyContent:'center',gap:8,marginBottom:8}}>
        {[1,2,3,4,5].map(i=><span key={i} style={{fontSize:36,cursor:'pointer',color:(hover||stars)>=i?'#f59e0b':'var(--border2)',transition:'color .1s,transform .1s',transform:(hover||stars)>=i?'scale(1.2)':'scale(1)'}}
          onClick={()=>setStars(i)}
          onMouseOver={()=>setHover(i)}
          onMouseOut={()=>setHover(0)}>★</span>)}
      </div>
      {stars>0&&<div style={{textAlign:'center',fontSize:13,color:'var(--y)',fontWeight:700,marginBottom:14}}>{labels[stars]}</div>}
      <div className="field mb14">
        <label>Review (optional)</label>
        <textarea placeholder="Share your experience working with this person…" value={review} onChange={e=>setReview(e.target.value)} style={{minHeight:80}}/>
      </div>
      <div style={{display:'flex',gap:10}}>
        <button className="btn btn-p" style={{flex:1}} onClick={submit} disabled={busy||stars===0}>{busy?'Submitting…':'Submit Review'}</button>
        <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
      </div>
    </>}
  </div>;
}

/* ── REPORT FORM COMPONENT ── */
function ReportForm({target,session,ratings,setRatings,onClose}){
  const[reason,setReason]=useState('');
  const[details,setDetails]=useState('');
  const[busy,setBusy]=useState(false);

  const REASONS=['Did not deliver work','Did not pay','Fake profile / scam','Inappropriate content','Spam','Harassment','Other'];

  const submit=async()=>{
    if(!reason){toast('Please select a reason','r');return;}
    setBusy(true);
    const all=await DB.getShared('marketplace:ratings')||{};
    const existing=all[target.authorEmail]||{count:0,total:0,avg:0,flagged:0,reviews:[],reports:[]};
    // Check if already reported by this user
    if(existing.reports?.some(r=>r.from===session.user.email)){
      toast('You already reported this user','r');setBusy(false);return;
    }
    const reports=[...(existing.reports||[]),{from:session.user.email,reason,details:details.trim(),ts:Date.now()}];
    all[target.authorEmail]={...existing,flagged:(existing.flagged||0)+1,reports};
    await DB.setShared('marketplace:ratings',all);
    setRatings(all);
    setBusy(false);onClose();

    const flags=all[target.authorEmail].flagged;
    if(flags>=3){
      toast(`⚠️ ${target.authorName} has been flagged ${flags} times — SuperAdmin notified`,'r');
    } else {
      toast(`🚩 Report submitted. Thank you for keeping Shadow Portal safe.`,'g');
    }
  };

  return<div style={{padding:'16px 20px 20px'}}>
    <div style={{background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',borderRadius:10,padding:'12px 14px',marginBottom:16,fontSize:13,color:'var(--r)',lineHeight:1.6}}>
      Reporting <strong>{target.authorName}</strong>. Reports are reviewed by admins. Repeated violations result in account suspension.
    </div>
    <div className="field mb12"><label>Reason *</label>
      <select value={reason} onChange={e=>setReason(e.target.value)} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:9,padding:'10px 14px',color:reason?'var(--text)':'var(--text3)',fontSize:14,fontFamily:'var(--font)',width:'100%',cursor:'pointer'}}>
        <option value="">Select a reason…</option>
        {REASONS.map(r=><option key={r} value={r}>{r}</option>)}
      </select>
    </div>
    <div className="field mb16"><label>Additional details (optional)</label>
      <textarea placeholder="Describe what happened…" value={details} onChange={e=>setDetails(e.target.value)} style={{minHeight:70}}/>
    </div>
    <div style={{display:'flex',gap:10}}>
      <button className="btn btn-r" style={{flex:1}} onClick={submit} disabled={busy||!reason}>{busy?'Submitting…':'Submit Report'}</button>
      <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
    </div>
    <div style={{fontSize:11,color:'var(--text3)',textAlign:'center',marginTop:10}}>3+ reports → account automatically flagged for admin review</div>
  </div>;
}

    if(!form.title||!form.desc){toast('Please fill in title and description','r');return;}

      id:`post_${Date.now()}`,

        <button className="btn btn-p btn-sm" onClick={()=>setModal(true)}>+ Post {isClient?'Job Request':'Opportunity'}</button>

    {/* ── REPORT MODAL ── */}
    {reportTarget&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.85)',zIndex:930,display:'flex',alignItems:'center',justifyContent:'center',padding:16,backdropFilter:'blur(8px)'}} onClick={()=>setReportTarget(null)}>

          <div style={{display:'flex',gap:10,marginTop:12}}>
            <button className="btn btn-p" style={{flex:1,fontSize:14,padding:12}} onClick={async()=>{
              const text=document.getElementById('mkt-msg-input').value.trim();
              if(!text)return;
              const myEmail=session.user.email;
              const toEmail=msgTarget.authorEmail;
              const key=[myEmail,toEmail].sort().join('__').replace(/[@.]/g,'_');
              const existing=await DB.getShared(`convo:${key}`)||[];
              const msg={id:`msg_${Date.now()}`,from:myEmail,fromName:session.user.name,text,ts:Date.now()};
              await DB.setShared(`convo:${key}`,[...existing,msg]);
              setMsgTarget(null);
              toast(`Message sent to ${msgTarget.authorName} ✓`,'g');
            }}>Send Message</button>
            <button className="btn btn-ghost" onClick={()=>setMsgTarget(null)}>Cancel</button>

          <div style={{textAlign:'center',fontSize:11,color:'var(--text3)',marginTop:10}}>Message will appear in the Messages tab</div>
        </div>

    {/* My Postings Modal */}
    <Modal open={!!myPostingsModal} onClose={()=>setMyPostingsModal(null)} title="📋 My Postings"

      {myPostings.length===0?<div style={{textAlign:'center',padding:'30px',color:'var(--text3)'}}>You have not posted anything yet.</div>:
      myPostings.map(p=><div key={p.id} style={{padding:14,borderRadius:10,border:'1px solid var(--border)',marginBottom:8}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
          <div>
            <div style={{fontWeight:700,fontSize:13,marginBottom:4}}>{p.title}</div>
            <div style={{fontSize:11,color:'var(--text3)',display:'flex',gap:8}}>
              <span>{p.category}</span>
              {p.budget&&<span>€{p.budget}{p.budgetType==='hourly'?'/hr':''}</span>}
              <span>{new Date(p.ts).toLocaleDateString()}</span>
              <span style={{color:p.authorEmail===session.user.email&&channel==='clients'?'var(--b)':'var(--g)'}}>
                {postings.find(x=>x.id===p.id)?'Active':'—'}
              </span>
            </div>
          </div>
          <button className="btn btn-ghost btn-sm" style={{color:'var(--r)',flexShrink:0}} onClick={()=>deletePost(p.id)}>✕ Delete</button>
        </div>
      </div>)}
    </Modal>

    {/* New Post Modal */}
    <Modal open={modal} onClose={()=>setModal(false)}
      title={isClient?'🔍 Post a Job Request':'💼 Post a Service / Opportunity'}
      footer={<><button className="btn btn-p" style={{flex:1}} onClick={post}>Post</button><button className="btn btn-ghost" onClick={()=>setModal(false)}>Cancel</button></>}>
      <div className="field mb10"><label>{isClient?'What do you need? *':'What do you offer? *'}</label>
        <input placeholder={isClient?'e.g. Logo design for my startup':'e.g. Professional brand identity design'} value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))}/>
      </div>
      <div className="field mb10"><label>Category *</label>
        <select value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))}>
          {JOB_CATEGORIES.slice(1).map(c=><option key={c}>{c}</option>)}
        </select>
      </div>
      <div className="field mb10"><label>{isClient?'Describe the project *':'Describe your service *'}</label>
        <textarea placeholder={isClient?'Describe what you need, your brand, style preferences…':'Describe what you offer, your experience, past work…'} value={form.desc} onChange={e=>setForm(p=>({...p,desc:e.target.value}))} style={{minHeight:80}}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
        <div className="field mb0"><label>{isClient?'Your Budget (€)':'Your Rate (€)'}</label>
          <input type="number" placeholder="e.g. 500" value={form.budget} onChange={e=>setForm(p=>({...p,budget:e.target.value}))}/>
        </div>
        <div className="field mb0"><label>Price Type</label>
          <select value={form.budgetType} onChange={e=>setForm(p=>({...p,budgetType:e.target.value}))}>
            <option value="fixed">Fixed Price</option>
            <option value="hourly">Hourly Rate</option>
            <option value="negotiable">Negotiable</option>
          </select>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
        <div className="field mb0"><label>Timeline</label>
          <input placeholder="e.g. 2 weeks" value={form.timeline} onChange={e=>setForm(p=>({...p,timeline:e.target.value}))}/>
        </div>
        <div className="field mb0"><label>Contact (email/link)</label>
          <input placeholder={session.user.email} value={form.contact} onChange={e=>setForm(p=>({...p,contact:e.target.value}))}/>
        </div>
      </div>
      <div style={{background:'var(--bg3)',borderRadius:9,padding:'10px 12px',fontSize:12,color:'var(--text3)'}}>
        📢 Your posting will be visible to all Shadow Portal users. Your name and studio will be shown.
      </div>
    </Modal>
  </div>;
}

    if(planId===p)return;

      const users=await DB.getShared('users')||{};
      users[session.user.email].plan=planId;
      await DB.setShared('users',users);
      await refreshUser();

  const[cardName,setCardName]=useState('');
  const[cardExp,setCardExp]=useState('');
  const[cardCvc,setCardCvc]=useState('');
  const[paying,setPaying]=useState(false);

  const processPayment=async()=>{
    if(!cardNum||!cardName||!cardExp||!cardCvc){toast('Please fill in all card details','r');return;}

    await new Promise(r=>setTimeout(r,1800));

    await DB.setShared('users',users);
    await refreshUser();

    setPayModal(null);

          {pl.badge&&!isCurrent&&<div style={{position:'absolute',top:-11,left:16,background:'linear-gradient(135deg,#f59e0b,#d97706)',color:'#000',fontSize:10,fontWeight:800,padding:'3px 12px',borderRadius:99}}>{pl.badge}</div>}

          <div style={{marginBottom:12}}>

              <span style={{fontSize:13,color:pl.color,fontWeight:800,textTransform:'uppercase',letterSpacing:'.6px'}}>{pl.name}</span>
            </div>
            <div style={{fontSize:30,fontWeight:900,lineHeight:1}}>€{pl.price}<span style={{fontSize:14,fontWeight:400,color:'var(--text2)'}}>/mo</span></div>
            <div style={{fontSize:12,color:'var(--text3)',marginTop:6,fontStyle:'italic'}}>{pl.tagline}</div>
          </div>
          {/* Features */}
          <div style={{borderTop:'1px solid var(--border)',paddingTop:12,marginBottom:12}}>
            {pl.features.map((f,i)=><div key={i} style={{fontSize:12,color:'var(--text)',marginBottom:8,display:'flex',alignItems:'flex-start',gap:8,lineHeight:1.5}}>
              <span style={{flexShrink:0,marginTop:1}}>{f.icon}</span>
              <span>{f.text}</span>
            </div>)}
            {pl.locked.length>0&&<div style={{borderTop:'1px solid var(--border)',paddingTop:10,marginTop:6}}>
              {pl.locked.map((f,i)=><div key={i} style={{fontSize:12,color:'var(--text3)',marginBottom:7,display:'flex',alignItems:'flex-start',gap:8,lineHeight:1.5}}>
                <span style={{flexShrink:0,marginTop:1}}>{f.icon}</span>
                <span>{f.text}</span>
              </div>)}
            </div>}
          </div>
          {/* Agency special callout */}
          {pl.id==='agency'&&!isCurrent&&<div style={{background:'rgba(9,132,227,.08)',border:'1px solid rgba(9,132,227,.2)',borderRadius:9,padding:'10px 12px',marginBottom:12,fontSize:12,color:'var(--b)',lineHeight:1.6}}>
            💡 <strong>Example:</strong> A client opens your portal and sees your studio logo, your brand colors, and your company name — they have no idea "Shadow Portal" exists. You look like a professional agency with your own custom tool.
          </div>}
          <button className="btn" style={{width:'100%',padding:11,fontSize:13,background:isCurrent?'transparent':isUpgrade?`linear-gradient(135deg,${pl.color},${pl.color}aa)`:'var(--bg3)',border:isCurrent?'1px solid var(--border)':'none',color:isCurrent?'var(--text3)':isUpgrade?'#fff':'var(--text2)',fontWeight:700,borderRadius:9}} onClick={()=>upgrade(pl.id)} disabled={isCurrent}>
            {isCurrent?'✓ Current Plan':isUpgrade?(canUpgradeFree?'Switch to '+pl.name:('Upgrade — €'+pl.price+'/mo')):'Downgrade to '+pl.name}
          </button>
        </div>;
      })}
    </div>
  </div>;
}

              </label>
              <select style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:7,padding:'5px 8px',color:'var(--text)',fontSize:12,cursor:'pointer',fontFamily:'var(--font)'}} value={u.plan||'free'} onChange={e=>setPlan(email,e.target.value)}>
                <option value="free">Free</option><option value="pro">Pro</option><option value="agency">Agency</option>
              </select>
            </>}
          </div>
        </div>;
      })}
    </div>

    {/* User Profile Modal */}
    <Modal open={!!selected&&!!selectedUser} onClose={()=>setSelected(null)} title="👤 User Profile"
      footer={<>
        {!selectedIsSA&&<button className="btn btn-r btn-sm" onClick={()=>deleteUser(selected.email)}>🗑 Delete User</button>}
        <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setSelected(null)}>Close</button>
      </>}>
      {selectedUser&&<div>
        {/* Header */}
        <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:20,padding:'0 0 20px',borderBottom:'1px solid var(--border)'}}>
          <div style={{position:'relative'}}>
            <div style={{width:64,height:64,borderRadius:'50%',background:`linear-gradient(135deg,${selectedIsSA?'#e17055,#fdcb6e':'var(--p),var(--p2)'})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,fontWeight:800,color:'#fff'}}>{initials(selectedUser.name)}</div>
            {selectedOnline&&<div className="online-dot" style={{position:'absolute',bottom:2,right:2,width:14,height:14,border:'3px solid var(--bg2)'}}/>}
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:18,fontWeight:800,marginBottom:4}}>{selectedUser.name}</div>
            <div style={{fontSize:13,color:'var(--text2)',marginBottom:6}}>{selected.email}</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              <span className={`badge ${{free:'badge-gray',pro:'badge-p',agency:'badge-b'}[selectedUser.plan]||'badge-gray'}`}>{(selectedUser.plan||'free').toUpperCase()}</span>
              {selectedIsSA&&<span className="badge badge-r">SUPERADMIN</span>}
              {selectedUser.isAdmin&&!selectedIsSA&&<span className="badge badge-y">ADMIN</span>}
              {selectedOnline?<span className="badge badge-g">● Online</span>:<span className="badge badge-gray">Offline</span>}
            </div>
          </div>
        </div>

        {/* Stats */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:20}}>
          <div style={{background:'var(--bg3)',borderRadius:9,padding:12,textAlign:'center'}}>
            <div style={{fontSize:10,color:'var(--text3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:6}}>Earned</div>
            <div style={{fontSize:18,fontWeight:800,color:'var(--g)'}}>{fmt(selectedUser.totalEarned||0)}</div>
          </div>
          <div style={{background:'var(--bg3)',borderRadius:9,padding:12,textAlign:'center'}}>
            <div style={{fontSize:10,color:'var(--text3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:6}}>Withdrawn</div>
            <div style={{fontSize:18,fontWeight:800,color:'var(--p2)'}}>{fmt(selectedUser.totalSpent||0)}</div>
          </div>
          <div style={{background:'var(--bg3)',borderRadius:9,padding:12,textAlign:'center'}}>
            <div style={{fontSize:10,color:'var(--text3)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:6}}>Projects</div>
            <div style={{fontSize:18,fontWeight:800}}>{(selectedUser.projects||[]).length}</div>
          </div>
        </div>

        {/* Details */}
        <div style={{background:'var(--bg3)',borderRadius:9,padding:14,marginBottom:16,fontSize:13}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}><span style={{color:'var(--text3)'}}>Studio</span><span style={{fontWeight:600}}>{selectedUser.studio||'—'}</span></div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}><span style={{color:'var(--text3)'}}>Clients</span><span style={{fontWeight:600}}>{(selectedUser.clients||[]).length}</span></div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}><span style={{color:'var(--text3)'}}>Files</span><span style={{fontWeight:600}}>{(selectedUser.files||[]).length}</span></div>
          <div style={{display:'flex',justifyContent:'space-between'}}><span style={{color:'var(--text3)'}}>Joined</span><span style={{fontWeight:600}}>{fmtDate(selectedUser.joinedAt)}</span></div>
        </div>

        {/* Admin controls */}
        {!selectedIsSA&&<div style={{display:'flex',gap:10}}>
          <div className="field mb0" style={{flex:1}}>
            <label>Plan</label>
            <select style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:9,padding:'9px 14px',color:'var(--text)',fontSize:13,cursor:'pointer',fontFamily:'var(--font)',width:'100%'}} value={selectedUser.plan||'free'} onChange={e=>setPlan(selected.email,e.target.value)}>
              <option value="free">Free</option><option value="pro">Pro</option><option value="agency">Agency</option>
            </select>
          </div>
          <div style={{display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
            <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontSize:13,padding:'9px 0'}}>
              <input type="checkbox" checked={!!selectedUser.isAdmin} onChange={e=>setAdmin(selected.email,e.target.checked)} style={{width:15,height:15,accentColor:'var(--r)',cursor:'pointer'}}/>
              Admin Access
            </label>
          </div>
        </div>}
      </div>}
    </Modal>
  </div>;
}

/* ══════════════════════════════════════
   LEADERBOARD TAB (SuperAdmin only)
══════════════════════════════════════ */
function LeaderboardTab({users}){
  const[mode,setMode]=useState('earned'); // earned | spent
  const[search,setSearch]=useState('');

  const list=Object.entries(users).map(([email,u])=>({
    email,name:u.name,studio:u.studio,plan:u.plan,
    earned:u.totalEarned||0,spent:u.totalSpent||0,
    joinedAt:u.joinedAt,
  })).sort((a,b)=>mode==='earned'?b.earned-a.earned:b.spent-a.spent)
    .filter(u=>{
      if(!search)return true;
      const q=search.toLowerCase();
      return u.name?.toLowerCase().includes(q)||u.email.includes(q)||u.studio?.toLowerCase().includes(q);
    });

  const rankEl=(i)=>{
    if(i===0)return<span className="rank-gold">🥇</span>;
    if(i===1)return<span className="rank-silver">🥈</span>;
    if(i===2)return<span className="rank-bronze">🥉</span>;
    return<span className="rank-other">#{i+1}</span>;
  };

  return<div>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}}>
      <div><div style={{fontSize:20,fontWeight:800}}>🏆 Leaderboard</div><div style={{color:'var(--text2)',fontSize:13}}>Top performers across all users</div></div>
      <div style={{display:'flex',background:'var(--bg3)',borderRadius:9,padding:3,gap:3}}>
        <button className="btn btn-sm" style={{background:mode==='earned'?'linear-gradient(135deg,var(--p),var(--p2))':'transparent',color:mode==='earned'?'#fff':'var(--text2)',borderRadius:7}} onClick={()=>setMode('earned')}>💰 Most Earned</button>
        <button className="btn btn-sm" style={{background:mode==='spent'?'linear-gradient(135deg,var(--p),var(--p2))':'transparent',color:mode==='spent'?'#fff':'var(--text2)',borderRadius:7}} onClick={()=>setMode('spent')}>💸 Most Withdrawn</button>
      </div>
    </div>

    <div className="search-wrap mb16">
      <span className="search-icon">🔍</span>
      <input className="search-input" placeholder="Search by name, email, or studio…" value={search} onChange={e=>setSearch(e.target.value)}/>
    </div>

    {list.length===0?<div className="card" style={{textAlign:'center',padding:40,color:'var(--text3)'}}>No users found</div>:
    <div className="card">
      {list.map((u,i)=><div key={u.email} style={{display:'flex',alignItems:'center',gap:14,padding:14,borderRadius:10,border:`1px solid ${i<3?'rgba(108,92,231,.2)':'var(--border)'}`,background:i===0?'rgba(108,92,231,.06)':i===1?'rgba(178,190,195,.04)':i===2?'rgba(225,112,85,.04)':'transparent',marginBottom:8}}>
        <div style={{width:36,textAlign:'center',flexShrink:0}}>{rankEl(i)}</div>
        <div style={{width:40,height:40,borderRadius:'50%',background:'linear-gradient(135deg,var(--p),var(--p2))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:800,color:'#fff',flexShrink:0}}>{initials(u.name)}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,fontSize:14}}>{u.name}</div>
          <div style={{fontSize:11,color:'var(--text3)',marginTop:1}}>{u.studio||u.email} · <span className={`badge badge-${{free:'gray',pro:'p',agency:'b'}[u.plan]||'gray'}`} style={{fontSize:9,padding:'1px 6px'}}>{u.plan?.toUpperCase()}</span></div>
        </div>
        <div style={{textAlign:'right',flexShrink:0}}>
          <div style={{fontSize:20,fontWeight:900,color:mode==='earned'?'var(--g)':'var(--p2)'}}>{fmt(mode==='earned'?u.earned:u.spent)}</div>
          <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{mode==='earned'?'total earned':'total withdrawn'}</div>
        </div>
        <div style={{flexShrink:0,textAlign:'right'}}>
          <div style={{fontSize:11,color:'var(--text3)'}}>{mode==='earned'?fmt(u.spent)+' withdrawn':fmt(u.earned)+' earned'}</div>
        </div>
      </div>)}
    </div>}
  </div>;
}

/* ── BOOT ── */
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
